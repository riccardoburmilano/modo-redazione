<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUOTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060e;--s1:#0d0d1a;--s2:#141428;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);
  --gold:#f5c842;--gd:rgba(245,200,66,.09);
  --green:#00e87a;--red:#ff3d5a;--orange:#ff8c00;
  --purple:#a855f7;--blue:#4f8ef7;
  --text:#f0efe8;--t2:#909090;--t3:#404040;
  --g:'Inter',sans-serif;--sg:'Space Grotesk',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--g);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(80,30,140,.2),transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(20,50,120,.15),transparent 55%);pointer-events:none}

/* TICKER */
.ticker{position:fixed;top:0;left:0;right:0;z-index:1000;height:26px;background:var(--red);display:flex;align-items:center;overflow:hidden}
.ticker-lbl{flex-shrink:0;background:rgba(0,0,0,.3);padding:0 12px;height:100%;display:flex;align-items:center;font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#fff;border-right:1px solid rgba(255,255,255,.2)}
.ticker-track{flex:1;overflow:hidden}
.ticker-inner{display:flex;gap:40px;animation:tick 50s linear infinite;white-space:nowrap;padding-left:100%}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{font-size:10px;font-weight:600;color:#fff;flex-shrink:0;display:flex;align-items:center;gap:6px}
.ti::after{content:'·';opacity:.4}

/* NAV */
.nav{position:fixed;top:26px;left:0;right:0;z-index:200;height:54px;background:rgba(6,6,14,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 18px;gap:12px}
.nav-ast{animation:rot 18s linear infinite;filter:drop-shadow(0 0 5px rgba(245,200,66,.4))}
@keyframes rot{to{transform:rotate(360deg)}}
.nav-logo{font-family:var(--sg);font-size:20px;font-weight:800;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-cats{display:flex;gap:1px;margin-left:10px}
.nav-cat{font-size:10px;font-weight:700;color:var(--t3);padding:5px 12px;border:none;background:none;cursor:pointer;border-radius:20px;transition:all .18s;letter-spacing:.05em;text-transform:uppercase}
.nav-cat:hover{color:var(--t2)}
.nav-cat.on{color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.18)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-qr{font-family:var(--sg);font-size:12px;font-weight:700;color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.15);padding:4px 12px;border-radius:20px;cursor:pointer}
.nav-squad{font-size:12px;font-weight:700;color:var(--purple);background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);padding:4px 12px;border-radius:20px;cursor:pointer;text-decoration:none}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.nav-live{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;color:var(--green);letter-spacing:.1em;text-transform:uppercase}

/* LAYOUT */
.app{display:grid;grid-template-columns:180px 1fr;min-height:100vh;padding-top:80px;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{background:rgba(8,8,18,.7);border-right:1px solid var(--b1);padding:14px 0;position:sticky;top:80px;height:calc(100vh - 80px);display:flex;flex-direction:column;overflow-y:auto}
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);padding:0 12px;margin-bottom:5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sb-item.on{color:var(--gold);background:var(--gd);border-left-color:var(--gold)}
.sb-ico{font-size:13px;width:16px;text-align:center}
.sb-cnt{margin-left:auto;font-size:9px;font-weight:700;color:var(--t3);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:6px}
.sb-div{height:1px;background:var(--b1);margin:8px 12px}
.sb-bot{margin-top:auto;padding:12px}
.sb-qr-box{background:var(--gd);border:1px solid rgba(245,200,66,.12);border-radius:8px;padding:10px;margin-bottom:6px;text-align:center}
.sb-qr-n{font-family:var(--sg);font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.sb-qr-l{font-size:8px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.sb-pct{font-size:10px;color:var(--t2);text-align:center;margin-top:3px}
.sb-fascia{font-size:10px;font-weight:600;text-align:center;padding:5px;border-radius:5px;margin-top:3px}
.sb-streak{font-size:10px;color:var(--t2);text-align:center;margin-top:4px}

/* MAIN */
.main{padding:16px;display:flex;flex-direction:column;gap:12px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';width:2px;height:10px;background:var(--gold);border-radius:1px;box-shadow:0 0 5px rgba(245,200,66,.4)}

/* ── EVENT CARD ── */
.event-card{border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.34,1.1,.64,1);position:relative;box-shadow:0 20px 60px rgba(0,0,0,.8);margin-bottom:10px;animation:fadeUp .5s ease forwards;opacity:0}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.event-card:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 32px 80px rgba(0,0,0,.9)}

/* HERO IMMAGINE */
.ec-hero{height:200px;position:relative;overflow:hidden}
.ec-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s ease}
.event-card:hover .ec-bg{transform:scale(1.04)}
.ec-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,6,14,.98) 0%,rgba(6,6,14,.7) 40%,rgba(6,6,14,.2) 100%)}
.ec-top-badges{position:absolute;top:14px;left:14px;right:14px;display:flex;align-items:center;justify-content:space-between}
.ec-cat-badge{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;padding:4px 10px;border-radius:20px;backdrop-filter:blur(8px)}
.ec-timer-badge{font-family:var(--sg);font-size:12px;font-weight:800;color:#fff;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
.ec-hype{position:absolute;top:14px;right:130px;font-size:9px;font-weight:800;color:#fff;background:rgba(255,140,0,.6);backdrop-filter:blur(8px);padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:4px}
.ec-bottom{position:absolute;bottom:0;left:0;right:0;padding:16px}
.ec-event-name{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px}
.ec-title{font-family:var(--sg);font-size:22px;font-weight:900;line-height:1.2;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.ec-subtitle{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}

/* SCOMMESSE */
.ec-body{background:rgba(10,10,20,.97);border:1px solid rgba(255,255,255,.07);border-top:none;padding:0}

/* PREVIEW SCOMMESSE (card chiusa) */
.ec-preview{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.ec-preview-row{display:flex;align-items:center;gap:10px}
.ep-q{flex:1;font-size:12px;color:var(--t2);line-height:1.3}
.ep-opts{display:flex;gap:4px;flex-shrink:0}
.ep-opt{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--b2);background:rgba(255,255,255,.04);color:var(--t2);transition:all .15s;font-family:var(--sg)}
.ep-opt:hover{border-color:rgba(245,200,66,.3);color:var(--gold);background:var(--gd)}
.ep-opt.sel{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.ep-opt.sel-g{border-color:var(--green);color:var(--green);background:rgba(0,232,122,.08)}
.ep-opt:disabled{opacity:.3;cursor:default}
.ec-more{padding:10px 16px 14px;font-size:10px;color:var(--t3);display:flex;align-items:center;justify-content:space-between}
.ec-more-btn{font-size:10px;font-weight:700;color:var(--purple);background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.15);padding:5px 12px;border-radius:20px;cursor:pointer;font-family:var(--sg);transition:all .2s}
.ec-more-btn:hover{background:rgba(168,85,247,.15)}
.ec-footer{padding:10px 16px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.2)}
.ec-placed{font-size:10px;color:var(--green)}
.ec-qr-max{font-family:var(--sg);font-size:11px;font-weight:700;color:var(--gold);margin-left:auto}
.ec-submit{padding:7px 16px;background:var(--gold);border:none;color:#000;font-size:11px;font-weight:800;border-radius:8px;cursor:pointer;font-family:var(--sg);transition:all .2s}
.ec-submit:hover{opacity:.88}

/* HURRY STRIP */
.hurry-strip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,61,90,.06);border-bottom:1px solid rgba(255,61,90,.12)}
.hs-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse .9s ease-in-out infinite;flex-shrink:0}
.hs-txt{font-size:10px;font-weight:700;color:var(--red);flex:1}
.hs-timer{font-family:var(--sg);font-size:14px;font-weight:900;color:var(--red);text-shadow:0 0 12px rgba(255,61,90,.4)}

/* FLASH CARD */
.flash-card{position:fixed;inset:0;z-index:500;background:rgba(4,4,12,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px}
.flash-card.open{display:flex}
.fc-box{background:rgba(10,10,20,.99);border:2px solid var(--red);border-radius:20px;width:min(440px,94vw);box-shadow:0 0 80px rgba(255,61,90,.4),0 32px 80px rgba(0,0,0,.9);animation:fcIn .35s cubic-bezier(.34,1.4,.64,1)}
@keyframes fcIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.fc-head{background:var(--red);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.fc-badge{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:5px}
.fc-rdot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse .8s ease-in-out infinite}
.fc-big-timer{font-family:var(--sg);font-size:32px;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.5)}
.fc-body{padding:22px}
.fc-cat{font-size:8px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
.fc-q{font-family:var(--sg);font-size:20px;font-weight:800;line-height:1.28;letter-spacing:-.02em;margin-bottom:10px}
.fc-ctx{font-size:11px;color:var(--t2);line-height:1.6;margin-bottom:16px;padding:10px;background:rgba(255,61,90,.06);border-left:2px solid rgba(255,61,90,.3);border-radius:0 6px 6px 0}
.fc-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fc-btn{padding:13px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--sg);border:1px solid transparent;transition:all .2s}
.fc-btn.yes{background:rgba(0,232,122,.1);border-color:rgba(0,232,122,.2);color:var(--green)}
.fc-btn.yes:hover{background:var(--green);color:#000;box-shadow:0 8px 24px rgba(0,232,122,.4)}
.fc-btn.no{background:rgba(255,61,90,.1);border-color:rgba(255,61,90,.2);color:var(--red)}
.fc-btn.no:hover{background:var(--red);color:#fff}
.fc-skip{width:100%;padding:7px;background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--t3);font-size:10px;cursor:pointer;border-radius:6px;transition:all .2s}

/* MODAL FULL */
.modal-bg{position:fixed;inset:0;z-index:600;background:rgba(4,4,12,.92);backdrop-filter:blur(16px);display:none;overflow-y:auto;padding:20px}
.modal-bg.open{display:block}
.modal-wrap{max-width:680px;margin:0 auto;padding-bottom:40px}
.modal-close-btn{position:fixed;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.08);border:1px solid var(--b2);border-radius:50%;color:#fff;font-size:20px;cursor:pointer;z-index:601;display:flex;align-items:center;justify-content:center}

/* NOTIF */
.notif-stack{position:fixed;top:88px;right:14px;z-index:300;display:flex;flex-direction:column;gap:7px;pointer-events:none;max-width:270px}
.notif{background:rgba(12,12,22,.97);border:1px solid var(--b2);border-radius:10px;padding:10px 13px;pointer-events:all;animation:nIn .3s cubic-bezier(.34,1.3,.64,1);cursor:pointer;box-shadow:0 12px 36px rgba(0,0,0,.6);backdrop-filter:blur(16px)}
@keyframes nIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.notif.out{animation:nOut .2s ease forwards}
@keyframes nOut{to{transform:translateX(110%);opacity:0}}
.n-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.n-icon{font-size:14px}
.n-title{font-family:var(--sg);font-size:11px;font-weight:700;flex:1}
.n-x{background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;line-height:1}
.n-body{font-size:10px;color:var(--t2);line-height:1.5}

/* PROFILO */
.prof-bg{position:fixed;inset:0;z-index:700;background:rgba(4,4,12,.9);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center}
.prof-bg.open{display:flex}
.prof-box{background:rgba(12,12,22,.98);border:1px solid var(--b2);border-radius:20px;padding:26px;width:min(340px,92vw);box-shadow:0 32px 80px rgba(0,0,0,.9)}
.prof-ast{animation:rot 16s linear infinite;display:block;margin:0 auto 14px}
.prof-name{font-family:var(--sg);font-size:22px;font-weight:900;text-align:center;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.prof-fascia{text-align:center;font-size:13px;font-weight:700;margin-bottom:18px}
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.pg{background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:8px;padding:11px;text-align:center}
.pg-n{font-family:var(--sg);font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.pg-l{font-size:8px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.prof-bar-wrap{margin-bottom:12px}
.prof-bar-row{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:5px}
.prof-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.prof-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:3px;transition:width 1s}
.prof-fascia-list{display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
.pfl-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;font-size:10px}
.pfl-row.active{background:var(--gd);border:1px solid rgba(245,200,66,.12)}
.pfl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pfl-name{flex:1;font-weight:500}
.pfl-req{font-size:9px;color:var(--t3)}
.prof-close{width:100%;padding:10px;background:rgba(255,255,255,.06);border:1px solid var(--b1);border-radius:8px;color:var(--text);font-family:var(--sg);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.prof-close:hover{background:rgba(255,255,255,.1)}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(12,12,22,.97);border:1px solid var(--b2);border-radius:10px;padding:9px 16px;font-size:11px;font-weight:600;color:var(--text);z-index:999;opacity:0;transition:all .28s;pointer-events:none;backdrop-filter:blur(16px);font-family:var(--sg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .nav-cats{display:none}
  .ticker,.nav{position:fixed}
}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-lbl">⚡ LIVE</div>
  <div class="ticker-track"><div class="ticker-inner" id="ticker"></div></div>
</div>

<!-- NAV -->
<nav class="nav">
  <a href="index-quota.html" style="display:flex;align-items:center;gap:8px;text-decoration:none">
    <svg class="nav-ast" width="19" height="19" viewBox="0 0 20 20" fill="none">
      <line x1="10" y1="1" x2="10" y2="19" stroke="#f5c842" stroke-width="1.2"/>
      <line x1="1" y1="10" x2="19" y2="10" stroke="#f5c842" stroke-width="1.2"/>
      <line x1="2.93" y1="2.93" x2="17.07" y2="17.07" stroke="#f5c842" stroke-width="1.2"/>
      <line x1="17.07" y1="2.93" x2="2.93" y2="17.07" stroke="#f5c842" stroke-width="1.2"/>
    </svg>
    <span class="nav-logo">QUOTA</span>
  </a>
  <div class="nav-cats">
    <button class="nav-cat on" onclick="filterCat('tutti')">Tutti</button>
    <button class="nav-cat" onclick="filterCat('Sport')">⚽ Sport</button>
    <button class="nav-cat" onclick="filterCat('Finanza')">📈 Finanza</button>
    <button class="nav-cat" onclick="filterCat('Politica')">🏛 Politica</button>
  </div>
  <div class="nav-right">
    <div class="nav-qr" onclick="openProf()">🎯 <span id="nav-qr">Top 60%</span></div>
    <a class="nav-squad" href="squad.html">👥 Squad</a>
    <div class="nav-live"><span class="ldot"></span>Live</div>
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div style="padding:12px 0">
      <div class="sb-lbl">Categoria</div>
      <button class="sb-item on" onclick="filterCat('tutti')"><span class="sb-ico">◈</span>Tutti<span class="sb-cnt" id="cnt-t">0</span></button>
      <button class="sb-item" onclick="filterCat('Sport')"><span class="sb-ico">⚽</span>Sport<span class="sb-cnt" id="cnt-s">0</span></button>
      <button class="sb-item" onclick="filterCat('Finanza')"><span class="sb-ico">📈</span>Finanza<span class="sb-cnt" id="cnt-f">0</span></button>
      <button class="sb-item" onclick="filterCat('Politica')"><span class="sb-ico">🏛</span>Politica<span class="sb-cnt" id="cnt-p">0</span></button>
      <div class="sb-div"></div>
      <div class="sb-lbl">Tipo</div>
      <button class="sb-item" onclick="filterType('hurry')"><span class="sb-ico" style="color:var(--red)">🔴</span>Hurry Up</button>
      <button class="sb-item" onclick="filterType('deep')"><span class="sb-ico" style="color:var(--gold)">⭐</span>Deep Bet</button>
      <div class="sb-div"></div>
      <button class="sb-item" onclick="filterMiei()"><span class="sb-ico">★</span>I miei</button>
      <button class="sb-item" onclick="location.href='squad.html'"><span class="sb-ico" style="color:var(--purple)">👥</span>Squad</button>
    </div>
    <div class="sb-bot">
      <div class="sb-qr-box">
        <div class="sb-qr-n" id="sb-qr">400</div>
        <div class="sb-qr-l">QUOTA Rating</div>
      </div>
      <div class="sb-pct" id="sb-pct">Top 60%</div>
      <div class="sb-fascia" id="sb-fascia">🌑 Neutrino</div>
      <div class="sb-streak" id="sb-streak">🔥 Streak: 0 giorni</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="sec-head">
      <div class="sec-title" id="sec-title">📅 Calendario eventi · Questa settimana</div>
    </div>

// ── RATING ENGINE ─────────────────────────────────────────────
const FL=[
  {n:'🌑 Neutrino',   p:0,  mx:40, c:'#a0a09a'},
  {n:'🔵 Orbiter',    p:40, mx:70, c:'#60a5fa'},
  {n:'💜 Pulsar',     p:70, mx:85, c:'#c084fc'},
  {n:'⭐ Quasar',     p:85, mx:95, c:'#f5c842'},
  {n:'✦ Singolarità', p:95, mx:100,c:'#00e87a'},
];
let qr=parseFloat(localStorage.getItem('q_qr')||'400');
let votes=JSON.parse(localStorage.getItem('qvotes')||'{}');
let dvotes=JSON.parse(localStorage.getItem('qdvotes')||'{}');
let vtot=parseInt(localStorage.getItem('q_vtot')||'0');
let azz=parseInt(localStorage.getItem('q_azz')||'0');
let streak=parseInt(localStorage.getItem('q_st')||'0');

function getPct(q){return Math.min(99,Math.max(1,Math.round((q/1000)*100)));}
function getFascia(p){return FL.slice().reverse().find(f=>p>=f.p)||FL[0];}

function decay(){
  const last=parseInt(localStorage.getItem('q_ldt')||Date.now());
  const dm=Math.floor((Date.now()-last)/86400000);
  if(dm>=2){qr=Math.max(0,qr-(dm-1)*8);save();}
}
function checkStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem('q_ld');
  const yest=new Date(Date.now()-86400000).toDateString();
  if(last===today)return;
  if(last===yest){streak++;if(streak===7){qr=Math.min(1000,qr+30);push('🔥','Streak 7 giorni!','+30 QR bonus');}}
  else if(last&&last!==yest){qr=Math.max(0,qr-15);streak=1;push('💔','Streak rotta','-15 QR. Torna ogni giorno!');}
  else streak=1;
  localStorage.setItem('q_st',streak);
  localStorage.setItem('q_ld',today);
  localStorage.setItem('q_ldt',Date.now());
}
function save(){
  localStorage.setItem('q_qr',qr.toFixed(1));
  localStorage.setItem('qvotes',JSON.stringify(votes));
  localStorage.setItem('qdvotes',JSON.stringify(dvotes));
  localStorage.setItem('q_vtot',vtot);
  const pct=getPct(qr);const f=getFascia(pct);
  const nq=document.getElementById('nav-qr');if(nq)nq.textContent='Top '+(100-pct)+'%';
  const sq=document.getElementById('sb-qr');if(sq)sq.textContent=Math.round(qr);
  const sp=document.getElementById('sb-pct');if(sp)sp.textContent='Top '+(100-pct)+'%';
  const sf=document.getElementById('sb-fascia');if(sf){sf.textContent=f.n;sf.style.color=f.c;sf.style.background='rgba('+hexRgb(f.c)+',.08)';}
  const ss=document.getElementById('sb-streak');if(ss)ss.textContent='🔥 Streak: '+streak+' giorni';
}
function hexRgb(h){const r=parseInt(h.slice(1,3),16);const g=parseInt(h.slice(3,5),16);const b=parseInt(h.slice(5,7),16);return r+','+g+','+b;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function push(icon,title,body){
  const s=document.getElementById('notif-stack');
  const el=document.createElement('div');el.className='notif';
  el.innerHTML=`<div class="n-top"><span class="n-icon">${icon}</span><span class="n-title">${title}</span><button class="n-x" onclick="this.closest('.notif').remove()">×</button></div><div class="n-body">${body}</div>`;
  s.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),250);},5000);
}

  default:'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80',

function getBg(event){
  const e=(event||'').toLowerCase();
  if(e.includes('wimbledon')||e.includes('tennis')||e.includes('atp')||e.includes('sinner'))return BG.tennis;
  if(e.includes('formula')||e.includes('f1')||e.includes('gp '))return BG.formula1;
  if(e.includes('inter')||e.includes('juve')||e.includes('milan')||e.includes('calcio')||e.includes('serie a')||e.includes('champions')||e.includes('mondiali'))return BG.calcio;
  if(e.includes('basket')||e.includes('nba'))return BG.basket;
  if(e.includes('bce')||e.includes('fed')||e.includes('btp')||e.includes('spread')||e.includes('tassi'))return BG.borsa;
  if(e.includes('finanza')||e.includes('borsa')||e.includes('cpi')||e.includes('nfp')||e.includes('pil'))return BG.finanza;
  if(e.includes('elezioni')||e.includes('politica')||e.includes('governo')||e.includes('meloni'))return BG.politica;
  return BG.sport;
}
function getCatColor(cat){return{Sport:'#fb923c',Finanza:'#f5c842',Politica:'#a855f7'}[cat]||'#60a5fa';}
function getCatBg(cat){return{Sport:'rgba(251,146,60,.15)',Finanza:'rgba(245,200,66,.12)',Politica:'rgba(168,85,247,.15)'}[cat]||'rgba(96,165,250,.12)';}

// ── COUNTDOWN ─────────────────────────────────────────────────
function cd(dl){
  const d=dl-Date.now();
  if(d<=0)return'SCADUTA';
  const days=Math.floor(d/86400000);
  const h=Math.floor((d%86400000)/3600000);
  const m=Math.floor((d%3600000)/60000);
  const s=Math.floor((d%60000)/1000);
  if(days>0)return days+'g '+h+'h';
  if(h>0)return h+'h '+m+'m';
  if(m>0)return m+'m '+s+'s';
  return s+'s';
}

let activeCat='tutti',activeType='tutti';

function renderCards(){
  const wrap=document.getElementById('cards-wrap');
  let events=[...EVENTS];
  if(activeCat!=='tutti')events=events.filter(e=>e.cat===activeCat);
  if(activeType==='hurry')events=events.filter(e=>e.type==='hurry');
  if(activeType==='deep')events=events.filter(e=>e.type==='deep');

  document.getElementById('cnt-t').textContent=EVENTS.length;
  document.getElementById('cnt-s').textContent=EVENTS.filter(e=>e.cat==='Sport').length;
  document.getElementById('cnt-f').textContent=EVENTS.filter(e=>e.cat==='Finanza').length;
  document.getElementById('cnt-p').textContent=EVENTS.filter(e=>e.cat==='Politica').length;

  wrap.innerHTML=events.map((ev,i)=>renderEvent(ev,i)).join('');
}

  return `<div class="event-card" style="animation-delay:${delay}ms" id="ev-${ev.id}">
    <!-- HERO -->
    <div class="ec-hero">
      <div class="ec-bg" style="background-image:url('${bgUrl}')"></div>

function selectBet(e,evId,betId,opt){
  e.stopPropagation();
  if(!dvotes[evId])dvotes[evId]={};
  if(dvotes[evId][betId]===opt)delete dvotes[evId][betId];
  else{if(!dvotes[evId][betId]){qr=Math.min(1000,qr+2);vtot++;}dvotes[evId][betId]=opt;}
  checkStreak();save();renderCards();
  toast('⚡ Scommessa registrata');
}

        <div style="font-size:11px;color:var(--t2)">${Object.keys(dv).length}/${ev.bets.length} scommesse</div>
        <div style="font-family:var(--sg);font-size:13px;font-weight:800;color:var(--gold)">+${Object.keys(dv).length*15} QR in gioco</div>
      </div>
    </div>`;

  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}

function updateModal(id){openEvent(id);}
function closeMod(e){
  if(e&&e.target!==document.getElementById('modal-bg')&&!e.target.classList.contains('modal-close-btn'))return;
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow='';
}

// ── FLASH EVENT ───────────────────────────────────────────────
const FLASH=[
  {cat:'Sport',q:'Sinner fa un ace nei prossimi 2 minuti?',ctx:'In campo ora al 3° set. 8 ace totali.'},
  {cat:'Finanza',q:'Il Nasdaq apre in positivo tra 5 minuti?',ctx:'Futures +0.3%. Apertura USA imminente.'},
];
let flashTimer=null,flashSecs=90,flashActive=null;
function triggerFlash(){
  const f=FLASH[Math.floor(Math.random()*FLASH.length)];
  flashActive=f;flashSecs=90;
  document.getElementById('fc-cat').textContent=f.cat;
  document.getElementById('fc-q').textContent=f.q;
  document.getElementById('fc-ctx').textContent=f.ctx;
  document.getElementById('fc-timer').textContent='90';
  document.getElementById('flash-card').classList.add('open');
  push('⚡','Flash Event!',f.q+' — Hai 90 secondi!');
  flashTimer=setInterval(()=>{
    flashSecs--;
    document.getElementById('fc-timer').textContent=flashSecs;
    if(flashSecs<=0)closeFlash();
    if(flashSecs<=10)document.getElementById('fc-timer').style.color='#ff3d5a';
  },1000);
}
function voteFlash(c){clearInterval(flashTimer);qr=Math.min(1000,qr+5);vtot++;save();toast('⚡ Flash votato! +5 QR + bonus se azzecchi');closeFlash();}
function closeFlash(){clearInterval(flashTimer);flashActive=null;document.getElementById('flash-card').classList.remove('open');document.getElementById('fc-timer').style.color='#fff';}
function scheduleFlash(){setTimeout(()=>{triggerFlash();scheduleFlash();},Math.random()*600000+480000);}

// ── TICKER ────────────────────────────────────────────────────
function initTicker(){
  const items=['⚽ Sinner 71% vince Wimbledon — QUOTA','📈 Spread BTP-Bund: 118bp — in calo','⚡ Inter vs Real Madrid: 52% passa Inter','🏎️ GP Silverstone: Verstappen favorito 38%','🔥 Flash Event tra pochi minuti','⭐ Top Quasar questa settimana: 847 QR','💜 Sfida Squad: Milano Traders vs Predatori Roma','🎯 Draft lunedì: 3 previsioni della settimana'];
  const html=[...items,...items].map(t=>`<span class="ti">${t}</span>`).join('');
  document.getElementById('ticker').innerHTML=html;
}

// ── FILTRI ────────────────────────────────────────────────────
function filterCat(c){
  activeCat=c;activeType='tutti';
  document.querySelectorAll('.nav-cat').forEach(b=>b.classList.toggle('on',b.textContent.replace('⚽ ','').replace('📈 ','').replace('🏛 ','')===c||(c==='tutti'&&b.textContent==='Tutti')));
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-title').textContent=c==='tutti'?'📅 Calendario eventi · Questa settimana':'📅 '+c+' · Questa settimana';
  renderCards();
}
function filterType(t){activeType=t;renderCards();}
function filterMiei(){
  activeType='tutti';activeCat='tutti';
  // Mostra solo eventi con scommesse piazzate
  const wrap=document.getElementById('cards-wrap');
  const myEvents=EVENTS.filter(ev=>Object.keys(dvotes[ev.id]||{}).length>0);
  if(!myEvents.length){wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3);font-size:13px">Nessuna scommessa ancora. <span style="color:var(--gold);cursor:pointer" onclick="filterCat(\'tutti\')">Vai agli eventi →</span></div>';return;}
  wrap.innerHTML=myEvents.map((ev,i)=>renderEvent(ev,i)).join('');
}

// ── PROFILO ───────────────────────────────────────────────────
function openProf(){
  const pct=getPct(qr);const f=getFascia(pct);const ni=FL.indexOf(f);const nf=FL[ni+1];
  const prog=nf?Math.round(((pct-f.p)/(nf.p-f.p))*100):100;
  document.getElementById('pf-fascia').textContent=f.n;document.getElementById('pf-fascia').style.color=f.c;
  document.getElementById('pf-qr').textContent=Math.round(qr);
  document.getElementById('pf-pct').textContent='Top '+(100-pct)+'%';
  document.getElementById('pf-voti').textContent=vtot;
  document.getElementById('pf-acc').textContent=vtot>0?Math.round(azz/vtot*100)+'%':'—%';
  document.getElementById('pf-bar').style.width=prog+'%';
  document.getElementById('pf-next').textContent=nf?'→ '+nf.n:'MAX';
  document.getElementById('pf-list').innerHTML=FL.map(r=>`
    <div class="pfl-row${r.n===f.n?' active':''}">
      <div class="pfl-dot" style="background:${r.c}"></div>
      <div class="pfl-name" style="color:${r.n===f.n?r.c:'var(--t3)'}">${r.n}</div>
      <div class="pfl-req">Top ${100-r.p}%</div>
    </div>`).join('');
  document.getElementById('prof-bg').classList.add('open');
}
function closeProf(e){if(e&&e.target!==document.getElementById('prof-bg'))return;document.getElementById('prof-bg').classList.remove('open');}

// ── COUNTDOWN LIVE ────────────────────────────────────────────
setInterval(()=>{
  EVENTS.forEach(ev=>{
    const el=document.getElementById('cd-'+ev.id);if(el)el.textContent=cd(ev.deadline);
    const hs=document.getElementById('hs-'+ev.id);if(hs)hs.textContent=cd(ev.deadline);
  });
},1000);

// ── INIT ──────────────────────────────────────────────────────
decay();checkStreak();save();
initTicker();renderCards();scheduleFlash();
setTimeout(()=>push('⚡','Benvenuto su QUOTA','5 eventi ad alto hype questa settimana. Piazza le tue scommesse!'),2000);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMod({target:document.getElementById('modal-bg')});closeFlash();}});
</script>
</body>
