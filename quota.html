<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUOTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060e;--s1:#0d0d1a;--s2:#141428;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);
  --gold:#f5c842;--gd:rgba(245,200,66,.09);
  --green:#00e87a;--red:#ff3d5a;--orange:#ff8c00;
  --purple:#a855f7;--blue:#4f8ef7;
  --text:#f0efe8;--t2:#909090;--t3:#404040;
  --g:'Inter',sans-serif;--sg:'Space Grotesk',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--g);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(80,30,140,.2),transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(20,50,120,.15),transparent 55%);pointer-events:none}

/* TICKER */
.ticker{position:fixed;top:0;left:0;right:0;z-index:1000;height:26px;background:var(--red);display:flex;align-items:center;overflow:hidden}
.ticker-lbl{flex-shrink:0;background:rgba(0,0,0,.3);padding:0 12px;height:100%;display:flex;align-items:center;font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#fff;border-right:1px solid rgba(255,255,255,.2)}
.ticker-track{flex:1;overflow:hidden}
.ticker-inner{display:flex;gap:40px;animation:tick 50s linear infinite;white-space:nowrap;padding-left:100%}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{font-size:10px;font-weight:600;color:#fff;flex-shrink:0;display:flex;align-items:center;gap:6px}
.ti::after{content:'·';opacity:.4}

/* NAV */
.nav{position:fixed;top:26px;left:0;right:0;z-index:200;height:54px;background:rgba(6,6,14,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 18px;gap:12px}
.nav-ast{animation:rot 18s linear infinite;filter:drop-shadow(0 0 5px rgba(245,200,66,.4))}
@keyframes rot{to{transform:rotate(360deg)}}
.nav-logo{font-family:var(--sg);font-size:20px;font-weight:800;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-cats{display:flex;gap:1px;margin-left:10px}
.nav-cat{font-size:10px;font-weight:700;color:var(--t3);padding:5px 12px;border:none;background:none;cursor:pointer;border-radius:20px;transition:all .18s;letter-spacing:.05em;text-transform:uppercase}
.nav-cat:hover{color:var(--t2)}
.nav-cat.on{color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.18)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-qr{font-family:var(--sg);font-size:12px;font-weight:700;color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.15);padding:4px 12px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:6px}
.nav-squad{font-size:12px;font-weight:700;color:var(--purple);background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);padding:4px 12px;border-radius:20px;cursor:pointer;text-decoration:none}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.nav-live{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;color:var(--green);letter-spacing:.1em;text-transform:uppercase}

/* LAYOUT */
.app{display:grid;grid-template-columns:180px 1fr;min-height:100vh;padding-top:80px;position:relative;z-index:1}
.sidebar{background:rgba(8,8,18,.7);border-right:1px solid var(--b1);padding:14px 0;position:sticky;top:80px;height:calc(100vh - 80px);display:flex;flex-direction:column;overflow-y:auto}
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);padding:0 12px;margin-bottom:5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sb-item.on{color:var(--gold);background:var(--gd);border-left-color:var(--gold)}
.sb-ico{font-size:13px;width:16px;text-align:center}
.sb-cnt{margin-left:auto;font-size:9px;font-weight:700;color:var(--t3);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:6px}
.sb-div{height:1px;background:var(--b1);margin:8px 12px}
.sb-bot{margin-top:auto;padding:12px}
.sb-qr-box{background:var(--gd);border:1px solid rgba(245,200,66,.12);border-radius:8px;padding:10px;margin-bottom:6px;text-align:center}
.sb-qr-n{font-family:var(--sg);font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.sb-qr-l{font-size:8px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.sb-pct{font-size:10px;color:var(--t2);text-align:center;margin-top:3px}
.sb-fascia{font-size:10px;font-weight:600;text-align:center;padding:5px;border-radius:5px;margin-top:3px}

/* MAIN */
.main{padding:16px;display:flex;flex-direction:column;gap:12px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';width:2px;height:10px;background:var(--gold);border-radius:1px}

/* EVENT CARD */
.event-card{border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.34,1.1,.64,1);position:relative;box-shadow:0 20px 60px rgba(0,0,0,.8);margin-bottom:10px;animation:fadeUp .5s ease forwards;opacity:0}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.event-card:hover{transform:translateY(-3px);box-shadow:0 32px 80px rgba(0,0,0,.9)}
.ec-hero{height:180px;position:relative;overflow:hidden}
.ec-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s ease}
.event-card:hover .ec-bg{transform:scale(1.04)}
.ec-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,6,14,.98) 0%,rgba(6,6,14,.6) 50%,rgba(6,6,14,.1) 100%)}
.ec-badges{position:absolute;top:14px;left:14px;right:14px;display:flex;align-items:center;gap:8px}
.ec-cat{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;border-radius:20px;backdrop-filter:blur(8px)}
.ec-hype{font-size:9px;font-weight:800;color:#fff;background:rgba(255,140,0,.7);padding:3px 9px;border-radius:20px}
.ec-timer{font-family:var(--sg);font-size:11px;font-weight:800;color:#fff;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);padding:3px 10px;border-radius:20px;margin-left:auto}
.ec-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 16px}
.ec-event-name{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
.ec-title{font-family:var(--sg);font-size:20px;font-weight:900;line-height:1.2;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.ec-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.ec-body{background:rgba(10,10,20,.97);border:1px solid rgba(255,255,255,.07);border-top:none}
.hurry-strip{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(255,61,90,.07);border-bottom:1px solid rgba(255,61,90,.12)}
.hs-dot{width:4px;height:4px;border-radius:50%;background:var(--red);animation:pulse .9s ease-in-out infinite;flex-shrink:0}
.hs-txt{font-size:9px;font-weight:700;color:var(--red);flex:1;letter-spacing:.06em;text-transform:uppercase}
.hs-cd{font-family:var(--sg);font-size:13px;font-weight:900;color:var(--red)}
.ec-bets{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.bet-row{display:flex;align-items:center;gap:10px}
.bet-q{flex:1;font-size:11px;color:var(--t2);line-height:1.3}
.bet-opts{display:flex;gap:4px;flex-shrink:0}
.bet-opt{padding:5px 10px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--b2);background:rgba(255,255,255,.04);color:var(--t2);transition:all .15s;font-family:var(--sg)}
.bet-opt:hover:not(:disabled){border-color:rgba(245,200,66,.3);color:var(--gold);background:var(--gd)}
.bet-opt.sel{border-color:var(--gold);color:var(--gold);background:var(--gd);box-shadow:0 0 8px rgba(245,200,66,.1)}
.bet-opt:disabled{opacity:.3;cursor:default}
.ec-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.2)}
.ec-more-btn{font-size:10px;font-weight:700;color:var(--purple);background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.15);padding:4px 12px;border-radius:20px;cursor:pointer;font-family:var(--sg);transition:all .2s;margin-left:auto}
.ec-more-btn:hover{background:rgba(168,85,247,.15)}
.ec-placed{font-size:10px;color:var(--green)}
.ec-qr{font-family:var(--sg);font-size:11px;font-weight:700;color:var(--gold)}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:14px;color:var(--t3)}
.empty-icon{font-size:48px;opacity:.4}
.empty-title{font-family:var(--sg);font-size:18px;font-weight:700;color:var(--t2)}
.empty-sub{font-size:13px;line-height:1.65;max-width:360px}
.empty-btn{padding:10px 24px;background:var(--gd);border:1px solid rgba(245,200,66,.2);color:var(--gold);font-family:var(--sg);font-size:12px;font-weight:700;border-radius:20px;cursor:pointer;transition:all .2s;text-decoration:none}
.empty-btn:hover{background:rgba(245,200,66,.15)}

/* FLASH */
.flash-wrap{position:fixed;inset:0;z-index:500;background:rgba(4,4,12,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px}
.flash-wrap.open{display:flex}
.flash-box{background:rgba(10,10,20,.99);border:2px solid var(--red);border-radius:20px;width:min(420px,94vw);box-shadow:0 0 80px rgba(255,61,90,.3),0 32px 80px rgba(0,0,0,.9);animation:fcIn .3s cubic-bezier(.34,1.4,.64,1)}
@keyframes fcIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.flash-head{background:var(--red);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.flash-badge{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:5px}
.flash-rdot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse .8s ease-in-out infinite}
.flash-timer{font-family:var(--sg);font-size:30px;font-weight:900;color:#fff}
.flash-body{padding:20px}
.flash-cat{font-size:8px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px}
.flash-q{font-family:var(--sg);font-size:19px;font-weight:800;line-height:1.28;margin-bottom:10px}
.flash-ctx{font-size:11px;color:var(--t2);line-height:1.6;margin-bottom:14px;padding:9px;background:rgba(255,61,90,.06);border-left:2px solid rgba(255,61,90,.3);border-radius:0 6px 6px 0}
.flash-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.flash-btn{padding:12px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--sg);border:1px solid transparent;transition:all .2s}
.flash-btn.yes{background:rgba(0,232,122,.1);border-color:rgba(0,232,122,.2);color:var(--green)}
.flash-btn.yes:hover{background:var(--green);color:#000}
.flash-btn.no{background:rgba(255,61,90,.1);border-color:rgba(255,61,90,.2);color:var(--red)}
.flash-btn.no:hover{background:var(--red);color:#fff}
.flash-skip{width:100%;padding:7px;background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--t3);font-size:10px;cursor:pointer;border-radius:6px}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:600;background:rgba(4,4,12,.92);backdrop-filter:blur(16px);display:none;overflow-y:auto;padding:20px}
.modal-bg.open{display:block}
.modal-wrap{max-width:660px;margin:0 auto;padding-bottom:40px}
.modal-close{position:fixed;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.08);border:1px solid var(--b2);border-radius:50%;color:#fff;font-size:20px;cursor:pointer;z-index:601;display:flex;align-items:center;justify-content:center}

/* NOTIFICHE */
.notif-stack{position:fixed;top:88px;right:14px;z-index:300;display:flex;flex-direction:column;gap:7px;pointer-events:none;max-width:260px}
.notif{background:rgba(12,12,22,.97);border:1px solid var(--b2);border-radius:10px;padding:10px 12px;pointer-events:all;animation:nIn .3s cubic-bezier(.34,1.3,.64,1);box-shadow:0 12px 36px rgba(0,0,0,.6);backdrop-filter:blur(16px)}
@keyframes nIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.notif.out{animation:nOut .2s ease forwards}
@keyframes nOut{to{transform:translateX(110%);opacity:0}}
.n-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.n-icon{font-size:14px}.n-title{font-family:var(--sg);font-size:11px;font-weight:700;flex:1}
.n-x{background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer}
.n-body{font-size:10px;color:var(--t2);line-height:1.5}

/* PROFILO */
.prof-bg{position:fixed;inset:0;z-index:700;background:rgba(4,4,12,.9);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center}
.prof-bg.open{display:flex}
.prof-box{background:rgba(12,12,22,.98);border:1px solid var(--b2);border-radius:20px;padding:24px;width:min(340px,92vw);box-shadow:0 32px 80px rgba(0,0,0,.9)}
.prof-avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(168,85,247,.2);border:2px solid rgba(168,85,247,.3)}
.prof-name{font-family:var(--sg);font-size:18px;font-weight:800;text-align:center;margin-bottom:3px}
.prof-handle{font-size:11px;color:var(--t2);text-align:center;margin-bottom:14px}
.prof-fascia{text-align:center;font-size:13px;font-weight:700;margin-bottom:16px}
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.pg{background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:8px;padding:11px;text-align:center}
.pg-n{font-family:var(--sg);font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.pg-l{font-size:8px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.prof-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:12px}
.prof-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:3px;transition:width 1s}
.prof-ranks{display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
.pr-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;font-size:10px}
.pr-row.active{background:var(--gd);border:1px solid rgba(245,200,66,.12)}
.pr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.prof-close{width:100%;padding:10px;background:rgba(255,255,255,.06);border:1px solid var(--b1);border-radius:8px;color:var(--text);font-family:var(--sg);font-size:12px;font-weight:700;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(12,12,22,.97);border:1px solid var(--b2);border-radius:10px;padding:9px 16px;font-size:11px;font-weight:600;color:var(--text);z-index:999;opacity:0;transition:all .28s;pointer-events:none;font-family:var(--sg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .nav-cats{display:none}
}
</style>
</head>
<body>

<div class="ticker"><div class="ticker-lbl">⚡ LIVE</div><div class="ticker-track"><div class="ticker-inner" id="ticker"></div></div></div>

<nav class="nav">
  <a href="index-quota.html" style="display:flex;align-items:center;gap:8px;text-decoration:none">
    <svg class="nav-ast" width="19" height="19" viewBox="0 0 20 20" fill="none">
      <line x1="10" y1="1" x2="10" y2="19" stroke="#f5c842" stroke-width="1.2"/>
      <line x1="1" y1="10" x2="19" y2="10" stroke="#f5c842" stroke-width="1.2"/>
      <line x1="2.93" y1="2.93" x2="17.07" y2="17.07" stroke="#f5c842" stroke-width="1.2"/>
      <line x1="17.07" y1="2.93" x2="2.93" y2="17.07" stroke="#f5c842" stroke-width="1.2"/>
    </svg>
    <span class="nav-logo">QUOTA</span>
  </a>
  <div class="nav-cats">
    <button class="nav-cat on" onclick="filterCat('tutti')">Tutti</button>
    <button class="nav-cat" onclick="filterCat('Sport')">⚽ Sport</button>
    <button class="nav-cat" onclick="filterCat('Finanza')">📈 Finanza</button>
    <button class="nav-cat" onclick="filterCat('Politica')">🏛 Politica</button>
  </div>
  <div class="nav-right">
    <div class="nav-qr" onclick="openProf()">
      <img id="nav-tg-img" style="width:20px;height:20px;border-radius:50%;display:none" src="">
      🎯 <span id="nav-qr">Top 60%</span>
    </div>
    <a class="nav-squad" href="squad.html">👥 Squad</a>
    <div class="nav-live"><span class="ldot"></span>Live</div>
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div style="padding:12px 0">
      <div class="sb-lbl">Categoria</div>
      <button class="sb-item on" onclick="filterCat('tutti')"><span class="sb-ico">◈</span>Tutti<span class="sb-cnt" id="cnt-t">0</span></button>
      <button class="sb-item" onclick="filterCat('Sport')"><span class="sb-ico">⚽</span>Sport<span class="sb-cnt" id="cnt-s">0</span></button>
      <button class="sb-item" onclick="filterCat('Finanza')"><span class="sb-ico">📈</span>Finanza<span class="sb-cnt" id="cnt-f">0</span></button>
      <button class="sb-item" onclick="filterCat('Politica')"><span class="sb-ico">🏛</span>Politica<span class="sb-cnt" id="cnt-p">0</span></button>
      <div class="sb-div"></div>
      <button class="sb-item" onclick="filterMiei()"><span class="sb-ico">★</span>I miei voti</button>
      <button class="sb-item" onclick="location.href='squad.html'"><span class="sb-ico" style="color:var(--purple)">👥</span>Squad</button>
    </div>
    <div class="sb-bot">
      <div class="sb-qr-box">
        <div class="sb-qr-n" id="sb-qr">400</div>
        <div class="sb-qr-l">QUOTA Rating</div>
      </div>
      <div class="sb-pct" id="sb-pct">Top 60%</div>
      <div class="sb-fascia" id="sb-fascia">🌑 Neutrino</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="sec-head">
      <div class="sec-title" id="sec-title">📅 Calendario eventi · In corso</div>
    </div>
    <div id="cards-wrap"></div>
  </main>
</div>

<!-- FLASH -->
<div class="flash-wrap" id="flash-wrap">
  <div class="flash-box">
    <div class="flash-head">
      <div class="flash-badge"><span class="flash-rdot"></span>⚡ FLASH EVENT</div>
      <div class="flash-timer" id="flash-timer">90</div>
    </div>
    <div class="flash-body">
      <div class="flash-cat" id="flash-cat"></div>
      <div class="flash-q" id="flash-q"></div>
      <div class="flash-ctx" id="flash-ctx"></div>
      <div class="flash-btns">
        <button class="flash-btn yes" onclick="voteFlash('si')">✓ Sì</button>
        <button class="flash-btn no" onclick="voteFlash('no')">✗ No</button>
      </div>
      <button class="flash-skip" onclick="closeFlash()">Salta →</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeMod(event)">
  <button class="modal-close" onclick="closeMod()">×</button>
  <div class="modal-wrap" id="modal-wrap"></div>
</div>

<!-- PROFILO -->
<div class="prof-bg" id="prof-bg" onclick="closeProf(event)">
  <div class="prof-box">
    <div class="prof-avatar" id="pf-avatar">⚡</div>
    <div class="prof-name" id="pf-name">QUOTA</div>
    <div class="prof-handle" id="pf-handle"></div>
    <div class="prof-fascia" id="pf-fascia">🌑 Neutrino</div>
    <div class="prof-grid">
      <div class="pg"><div class="pg-n" id="pf-qr">400</div><div class="pg-l">QR Rating</div></div>
      <div class="pg"><div class="pg-n" id="pf-pct">Top 60%</div><div class="pg-l">Percentile</div></div>
      <div class="pg"><div class="pg-n" id="pf-voti">0</div><div class="pg-l">Voti</div></div>
      <div class="pg"><div class="pg-n" id="pf-acc">—%</div><div class="pg-l">Accuratezza</div></div>

  </div>

<div class="toast" id="toast"></div>

<script>
const BUR='https://god-core-backend.onrender.com';

// ── RATING ENGINE ─────────────────────────────────────────────
const FL=[
  {n:'🌑 Neutrino',   p:0,  c:'#a0a09a'},
  {n:'🔵 Orbiter',    p:40, c:'#60a5fa'},
  {n:'💜 Pulsar',     p:70, c:'#c084fc'},
  {n:'⭐ Quasar',     p:85, c:'#f5c842'},
  {n:'✦ Singolarità', p:95, c:'#00e87a'},
];
let qr=parseFloat(localStorage.getItem('q_qr')||'400');
let dvotes=JSON.parse(localStorage.getItem('qdvotes')||'{}');
let vtot=parseInt(localStorage.getItem('q_vtot')||'0');
let azz=parseInt(localStorage.getItem('q_azz')||'0');
let streak=parseInt(localStorage.getItem('q_st')||'0');

// Telegram
const tgId=localStorage.getItem('quota_tg_id');
const tgName=localStorage.getItem('quota_tg_name')||'';
const tgUsername=localStorage.getItem('quota_tg_username')||'';
const tgPhoto=localStorage.getItem('quota_tg_photo')||'';
const TOKEN=tgId?'tg_'+tgId:(localStorage.getItem('quota_token')||('anon_'+Math.random().toString(36).slice(2)));
if(!localStorage.getItem('quota_token'))localStorage.setItem('quota_token',TOKEN);

function getPct(q){return Math.min(99,Math.max(1,Math.round((q/1000)*100)));}
function getFascia(p){return FL.slice().reverse().find(f=>p>=f.p)||FL[0];}
function hexRgb(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);}

function decay(){
  const last=parseInt(localStorage.getItem('q_ldt')||Date.now());
  const dm=Math.floor((Date.now()-last)/86400000);
  if(dm>=2){qr=Math.max(0,qr-(dm-1)*8);save();}
}
function checkStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem('q_ld');
  const yest=new Date(Date.now()-86400000).toDateString();
  if(last===today)return;
  if(last===yest){streak++;if(streak===7){qr=Math.min(1000,qr+30);push('🔥','Streak 7 giorni!','+30 QR bonus');}}
  else if(last&&last!==yest){qr=Math.max(0,qr-15);streak=1;}
  else streak=1;
  localStorage.setItem('q_st',streak);localStorage.setItem('q_ld',today);localStorage.setItem('q_ldt',Date.now());
}
function save(){
  localStorage.setItem('q_qr',qr.toFixed(1));
  localStorage.setItem('qdvotes',JSON.stringify(dvotes));
  localStorage.setItem('q_vtot',vtot);
  const pct=getPct(qr);const f=getFascia(pct);
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('nav-qr','Top '+(100-pct)+'%');e('sb-qr',Math.round(qr));
  e('sb-pct','Top '+(100-pct)+'%');
  const sf=document.getElementById('sb-fascia');
  if(sf){sf.textContent=f.n;sf.style.color=f.c;sf.style.background='rgba('+hexRgb(f.c)+',.08)';}
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function push(icon,title,body){
  const s=document.getElementById('notif-stack');
  const el=document.createElement('div');el.className='notif';
  el.innerHTML='<div class="n-top"><span class="n-icon">'+icon+'</span><span class="n-title">'+title+'</span><button class="n-x" onclick="this.closest(\'.notif\').remove()">×</button></div><div class="n-body">'+body+'</div>';
  s.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),250);},5000);
}

// ── SFONDO PER CATEGORIA ──────────────────────────────────────
const BGMAP={
  tennis:'https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=800&q=80',
  calcio:'https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800&q=80',
  f1:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80',
  finanza:'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800&q=80',
  politica:'https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=800&q=80',
  sport:'https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=800&q=80',
  default:'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80',
};
function getBg(title,cat){
  const t=(title+' '+(cat||'')).toLowerCase();
  if(t.includes('wimbledon')||t.includes('tennis')||t.includes('atp')||t.includes('sinner'))return BGMAP.tennis;
  if(t.includes('formula')||t.includes('f1')||t.includes('gp '))return BGMAP.f1;
  if(t.includes('inter')||t.includes('juve')||t.includes('milan')||t.includes('calcio')||t.includes('champions')||t.includes('serie a')||t.includes('mondiali')||t.includes('kane')||t.includes('lautaro'))return BGMAP.calcio;
  if(t.includes('bce')||t.includes('fed')||t.includes('btp')||t.includes('tassi')||t.includes('spread')||t.includes('borsa')||t.includes('nfp')||t.includes('cpi'))return BGMAP.finanza;
  if(t.includes('elezioni')||t.includes('governo')||t.includes('meloni')||t.includes('politica')||t.includes('nato'))return BGMAP.politica;
  if(cat==='Finanza')return BGMAP.finanza;
  if(cat==='Politica')return BGMAP.politica;
  return BGMAP.sport;
}
function catColor(c){return{Sport:'#fb923c',Finanza:'#f5c842',Politica:'#a855f7',Mondo:'#4f8ef7',Tech:'#2dd4bf'}[c]||'#60a5fa';}
function catBg(c){return{Sport:'rgba(251,146,60,.15)',Finanza:'rgba(245,200,66,.12)',Politica:'rgba(168,85,247,.15)',Mondo:'rgba(79,142,247,.12)',Tech:'rgba(45,212,191,.12)'}[c]||'rgba(96,165,250,.12)';}

function cd(dl){
  const d=dl-Date.now();
  if(d<=0)return'SCADUTA';
  const days=Math.floor(d/86400000);
  const h=Math.floor((d%86400000)/3600000);
  const m=Math.floor((d%3600000)/60000);
  const s=Math.floor((d%60000)/1000);
  if(days>0)return days+'g '+h+'h';
  if(h>0)return h+'h '+m+'m';
  if(m>0)return m+'m '+s+'s';
  return s+'s';
}

// ── EVENTI DAL BACKEND ────────────────────────────────────────
let EVENTS=[];
let activeCat='tutti';

async function loadEvents(){
  const wrap=document.getElementById('cards-wrap');
  wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--t3);font-size:12px">Caricamento eventi...</div>';
  try{
    const r=await fetch(BUR+'/api/v2/quota/cards?limit=20');
    const d=await r.json();
    if(d.ok&&d.cards&&d.cards.length){
      EVENTS=d.cards.map(c=>({
        id:c.id,
        cat:c.categoria,
        type:c.status==='aperta'?'deep':'hurry',
        hype:80,
        eventName:c.categoria+' · QUOTA',
        title:c.domanda,
        subtitle:c.contesto||'',
        deadline:new Date(c.deadline).getTime(),
        bets:parseBets(c.bets||c.reward),
        votes_si:c.votes_si||0,
        votes_no:c.votes_no||0,
      }));
      updateCounts();
      renderCards();
    } else {
      renderEmpty();
    }
  }catch(e){
    renderEmpty();
  }
}

function parseBets(bets){
  if(Array.isArray(bets))return bets;
  try{const p=JSON.parse(bets);if(Array.isArray(p))return p;}catch(e){}
  // Fallback: scommessa semplice sì/no
  return [{id:'main',q:'Si avvera?',opts:['Sì','No']}];
}

function renderEmpty(){
  const wrap=document.getElementById('cards-wrap');
  wrap.innerHTML='<div class="empty-state">'
    +'<div class="empty-icon">⚡</div>'
    +'<div class="empty-title">Nessun evento in corso</div>'
    +'<div class="empty-sub">Il calendario eventi verrà aggiornato presto. Il gestore sta preparando le prossime scommesse.</div>'
    +'<a class="empty-btn" href="quota-gestionale.html">→ Gestionale</a>'
    +'</div>';
  updateCounts();
}

function updateCounts(){
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('cnt-t',EVENTS.length);
  e('cnt-s',EVENTS.filter(ev=>ev.cat==='Sport').length);
  e('cnt-f',EVENTS.filter(ev=>ev.cat==='Finanza').length);
  e('cnt-p',EVENTS.filter(ev=>ev.cat==='Politica').length);
}

function renderCards(){
  const wrap=document.getElementById('cards-wrap');
  let evs=[...EVENTS];
  if(activeCat!=='tutti')evs=evs.filter(ev=>ev.cat===activeCat);
  if(!evs.length){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Nessun evento in questa categoria</div></div>';return;}
  wrap.innerHTML=evs.map((ev,i)=>renderCard(ev,i)).join('');
  updateCounts();
}

function renderCard(ev,idx){
  const dv=dvotes[ev.id]||{};
  const placed=Object.keys(dv).length;
  const bg=getBg(ev.title,ev.cat);
  const cc=catColor(ev.cat);
  const cb=catBg(ev.cat);
  const isHurry=ev.type==='hurry'||ev.deadline-Date.now()<3600000*6;
  const preview=ev.bets.slice(0,3);
  const more=ev.bets.length-3;
  const delay=idx*60;

  return '<div class="event-card" style="animation-delay:'+delay+'ms">'
    +'<div class="ec-hero">'
    +'<div class="ec-bg" style="background-image:url(\''+bg+'\')"></div>'
    +'<div class="ec-overlay"></div>'
    +'<div class="ec-badges">'
    +'<span class="ec-cat" style="color:'+cc+';background:'+cb+';border:1px solid '+cc+'30">'+ev.cat+'</span>'
    +(ev.hype>=85?'<span class="ec-hype">🔥 HOT</span>':'')
    +'<span class="ec-timer" id="cd-'+ev.id+'">'+cd(ev.deadline)+'</span>'
    +'</div>'
    +'<div class="ec-bottom">'
    +'<div class="ec-event-name">'+ev.eventName+'</div>'
    +'<div class="ec-title">'+ev.title+'</div>'
    +(ev.subtitle?'<div class="ec-sub">'+ev.subtitle+'</div>':'')
    +'</div></div>'
    +(isHurry?'<div class="hurry-strip"><span class="hs-dot"></span><span class="hs-txt">Hurry Up · Scade presto</span><span class="hs-cd" id="hs-'+ev.id+'">'+cd(ev.deadline)+'</span></div>':'')
    +'<div class="ec-body">'
    +'<div class="ec-bets">'
    +preview.map(b=>{
      const sel=dv[b.id];
      const opts=b.opts.slice(0,3);
      return '<div class="bet-row">'
        +'<div class="bet-q">'+b.q+'</div>'
        +'<div class="bet-opts">'
        +opts.map(o=>'<button class="bet-opt'+(sel===o?' sel':'')+'" onclick="selectBet(event,\''+ev.id+'\',\''+b.id+'\',\''+o+'\')"'+(sel&&sel!==o?' disabled':'')+'>'+o+'</button>').join('')
        +(b.opts.length>3?'<button class="bet-opt" onclick="openEvent(\''+ev.id+'\')">+'+( b.opts.length-3)+'</button>':'')
        +'</div></div>';
    }).join('')
    +'</div>'
    +'<div class="ec-footer">'
    +(placed>0?'<span class="ec-placed">✓ '+placed+' scommesse in gioco</span>':'<span style="font-size:10px;color:var(--t3)">Piazza le scommesse</span>')
    +(more>0?'<button class="ec-more-btn" onclick="openEvent(\''+ev.id+'\')">+'+more+' scommesse →</button>':'<button class="ec-more-btn" onclick="openEvent(\''+ev.id+'\')">Vedi tutto →</button>')
    +'<span class="ec-qr">+'+ev.bets.length*15+' QR max</span>'
    +'</div></div></div>';
}

// ── SELECT BET ────────────────────────────────────────────────
function selectBet(e,evId,betId,opt){
  e.stopPropagation();
  if(!dvotes[evId])dvotes[evId]={};
  if(dvotes[evId][betId]===opt)delete dvotes[evId][betId];
  else{
    if(!dvotes[evId][betId]){qr=Math.min(1000,qr+2);vtot++;}
    dvotes[evId][betId]=opt;
    // Salva voto sul backend
    fetch(BUR+'/api/v2/quota/vote',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({card_id:evId+'_'+betId,scelta:opt,user_token:TOKEN})}).catch(()=>{});
  }
  checkStreak();save();renderCards();
  toast('⚡ Scommessa registrata');
}

// ── MODAL EVENTO ──────────────────────────────────────────────
function openEvent(id){
  const ev=EVENTS.find(e=>e.id===id);if(!ev)return;
  const dv=dvotes[ev.id]||{};
  const bg=getBg(ev.title,ev.cat);
  const cc=catColor(ev.cat);

  document.getElementById('modal-wrap').innerHTML=
    '<div style="height:200px;position:relative;border-radius:16px 16px 0 0;overflow:hidden">'
    +'<div style="position:absolute;inset:0;background-image:url(\''+bg+'\');background-size:cover;background-position:center"></div>'
    +'<div style="position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,6,14,.98) 0%,rgba(6,6,14,.5) 100%)"></div>'
    +'<div style="position:absolute;bottom:0;left:0;right:0;padding:18px">'
    +'<div style="font-size:8px;font-weight:700;letter-spacing:.14em;color:'+cc+';margin-bottom:5px">'+ev.eventName+'</div>'
    +'<div style="font-family:var(--sg);font-size:20px;font-weight:900;line-height:1.2">'+ev.title+'</div>'
    +'<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:4px">'+ev.subtitle+' · <span style="color:var(--gold);font-family:var(--sg);font-weight:700">'+cd(ev.deadline)+'</span></div>'
    +'</div></div>'
    +'<div style="background:rgba(10,10,20,.98);border:1px solid rgba(255,255,255,.08);border-radius:0 0 16px 16px;overflow:hidden">'
    +'<div style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between">'
    +'<div style="font-family:var(--sg);font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.08em;text-transform:uppercase">'+ev.bets.length+' scommesse · +'+ev.bets.length*15+' QR max</div>'
    +'<div style="font-size:10px;color:var(--green)">'+Object.keys(dv).length+' piazzate</div>'
    +'</div>'
    +ev.bets.map(b=>{
      const sel=dv[b.id];
      return '<div style="padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.04)">'
        +'<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between"><span>'+b.q+'</span><span style="color:var(--gold);font-family:var(--sg)">+15 QR</span></div>'
        +'<div class="bet-opts" style="flex-wrap:wrap">'
        +b.opts.map(o=>'<button class="bet-opt'+(sel===o?' sel':'')+'" onclick="selectBet(event,\''+ev.id+'\',\''+b.id+'\',\''+o+'\');updateModal(\''+ev.id+'\')"'+(sel&&sel!==o?' disabled':'')+'>'+o+'</button>').join('')
        +'</div></div>';
    }).join('')
    +'<div style="padding:13px 16px;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:space-between">'
    +'<div style="font-size:11px;color:var(--t2)">'+Object.keys(dv).length+'/'+ev.bets.length+' scommesse</div>'
    +'<div style="font-family:var(--sg);font-size:13px;font-weight:800;color:var(--gold)">+'+ev.bets.filter(b=>dv[b.id]).reduce((s)=>s+15,0)+' QR in gioco</div>'
    +'</div></div>';

  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function updateModal(id){openEvent(id);}
function closeMod(e){
  if(e&&e.target!==document.getElementById('modal-bg')&&!e.target.classList.contains('modal-close'))return;
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow='';
}

// ── FILTRI ────────────────────────────────────────────────────
function filterCat(c){
  activeCat=c;
  document.querySelectorAll('.nav-cat').forEach(b=>b.classList.toggle('on',b.textContent.replace(/[⚽📈🏛]\s/,'')===c||(c==='tutti'&&b.textContent==='Tutti')));
  document.getElementById('sec-title').textContent='📅 '+(c==='tutti'?'Calendario eventi · In corso':c+' · In corso');
  renderCards();
}
function filterMiei(){
  const myEvs=EVENTS.filter(ev=>Object.keys(dvotes[ev.id]||{}).length>0);
  const wrap=document.getElementById('cards-wrap');
  if(!myEvs.length){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">★</div><div class="empty-title">Nessuna scommessa ancora</div><div class="empty-sub">Torna al calendario e piazza le tue prime previsioni.</div></div>';return;}
  wrap.innerHTML=myEvs.map((ev,i)=>renderCard(ev,i)).join('');
}

// ── FLASH ─────────────────────────────────────────────────────
let flashTimer=null,flashSecs=90,flashActive=null;
const FLASH_POOL=[
  {cat:'Sport',q:'Sinner fa un ace nel prossimo game?',ctx:'In campo ora. 8 ace totali finora.'},
  {cat:'Finanza',q:'Il Nasdaq apre in positivo tra 5 minuti?',ctx:'Futures +0.3%. Apertura imminente.'},
];
function triggerFlash(){
  const f=FLASH_POOL[Math.floor(Math.random()*FLASH_POOL.length)];
  flashActive=f;flashSecs=90;
  document.getElementById('flash-cat').textContent=f.cat;
  document.getElementById('flash-q').textContent=f.q;
  document.getElementById('flash-ctx').textContent=f.ctx;
  document.getElementById('flash-timer').textContent='90';
  document.getElementById('flash-timer').style.color='#fff';
  document.getElementById('flash-wrap').classList.add('open');
  push('⚡','Flash Event!',f.q+' — 90 secondi!');
  flashTimer=setInterval(()=>{
    flashSecs--;
    const el=document.getElementById('flash-timer');
    if(el)el.textContent=flashSecs;
    if(flashSecs<=10&&el)el.style.color='var(--red)';
    if(flashSecs<=0)closeFlash();
  },1000);
}
function voteFlash(c){clearInterval(flashTimer);qr=Math.min(1000,qr+5);vtot++;save();toast('⚡ Flash votato! +5 QR');closeFlash();}
function closeFlash(){clearInterval(flashTimer);flashActive=null;document.getElementById('flash-wrap').classList.remove('open');}
function scheduleFlash(){setTimeout(()=>{triggerFlash();scheduleFlash();},Math.random()*600000+480000);}

// ── TICKER ────────────────────────────────────────────────────
function initTicker(){
  const items=['⚡ QUOTA · Il mercato cognitivo italiano','🔥 Wimbledon live · Sinner in campo','📈 Spread BTP-Bund: 118bp in calo','⭐ Flash Event in arrivo — rimani connesso','👥 Crea la tua Squad e sfida i canali Telegram','🎯 Vota ogni giorno per non perdere il tuo QR Rating'];
  const html=[...items,...items].map(t=>'<span class="ti">'+t+'</span>').join('');
  document.getElementById('ticker').innerHTML=html;
}

// ── PROFILO ───────────────────────────────────────────────────
function openProf(){
  const pct=getPct(qr);const f=getFascia(pct);
  const ni=FL.indexOf(f);const nf=FL[ni+1];
  const prog=nf?Math.round(((pct-f.p)/(nf.p-f.p))*100):100;
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};

  // Avatar Telegram
  const av=document.getElementById('pf-avatar');
  if(av){
    if(tgPhoto)av.innerHTML='<img src="'+tgPhoto+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
    else av.textContent='⚡';
  }
  e('pf-name',tgName||'QUOTA');
  e('pf-handle',tgUsername?'@'+tgUsername:'');
  e('pf-fascia',f.n);document.getElementById('pf-fascia').style.color=f.c;
  e('pf-qr',Math.round(qr));e('pf-pct','Top '+(100-pct)+'%');
  e('pf-voti',vtot);e('pf-acc',vtot>0?Math.round(azz/vtot*100)+'%':'—%');
  document.getElementById('pf-bar').style.width=prog+'%';
  document.getElementById('pf-ranks').innerHTML=FL.map(r=>'<div class="pr-row'+(r.n===f.n?' active':'')+'">'
    +'<div class="pr-dot" style="background:'+r.c+'"></div>'
    +'<div style="flex:1;font-size:10px;color:'+(r.n===f.n?r.c:'var(--t3)')+'">'+r.n+'</div>'
    +'<div style="font-size:9px;color:var(--t3)">Top '+(100-r.p)+'%</div>'
    +'</div>').join('');
  document.getElementById('prof-bg').classList.add('open');
}
function closeProf(e){if(e&&e.target!==document.getElementById('prof-bg'))return;document.getElementById('prof-bg').classList.remove('open');}

// ── COUNTDOWN LIVE ────────────────────────────────────────────
setInterval(()=>{
  EVENTS.forEach(ev=>{
    const el=document.getElementById('cd-'+ev.id);if(el)el.textContent=cd(ev.deadline);
    const hs=document.getElementById('hs-'+ev.id);if(hs)hs.textContent=cd(ev.deadline);
  });
},1000);

// Mostra foto Telegram nella nav
if(tgPhoto){const img=document.getElementById('nav-tg-img');if(img){img.src=tgPhoto;img.style.display='inline';}}

decay();checkStreak();save();
initTicker();
loadEvents();

setInterval(loadEvents,3*60*1000);

// Benvenuto
setTimeout(()=>{
  const nome=tgName?tgName.split(' ')[0]:'';
  push('⚡',nome?'Bentornato '+nome+'!':'Benvenuto su QUOTA','Piazza le tue scommesse sugli eventi in corso.');
},2000);

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMod({target:document.getElementById('modal-bg')});closeFlash();}});
