<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUOTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--s1:#0e0e1a;--s2:#151525;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);
  --gold:#f5c842;--gd:rgba(245,200,66,.09);
  --green:#00e87a;--red:#ff3d5a;--orange:#ff8c00;
  --purple:#a855f7;--blue:#4f8ef7;
  --text:#f0efe8;--t2:#909090;--t3:#404040;
  --g:'Inter',sans-serif;--sg:'Space Grotesk',sans-serif;
  --card:rgba(16,16,26,.92);--cb:rgba(255,255,255,.07);
  --sh:0 24px 60px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.06);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--g);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(80,30,130,.2),transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(20,50,130,.15),transparent 55%);pointer-events:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:58px;background:rgba(7,7,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:14px}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-ast{animation:rot 18s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.nav-name{font-family:var(--sg);font-size:21px;font-weight:800;background:linear-gradient(135deg,#fff 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-cats{display:flex;gap:2px;margin-left:8px}
.nav-cat{font-size:11px;font-weight:600;color:var(--t3);padding:5px 13px;border:none;background:none;cursor:pointer;border-radius:20px;transition:all .18s;letter-spacing:.04em;text-transform:uppercase}
.nav-cat:hover{color:var(--t2)}
.nav-cat.on{color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.18)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-cr{font-family:var(--sg);font-size:13px;font-weight:700;color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.15);padding:5px 13px;border-radius:20px;display:flex;align-items:center;gap:5px}
.nav-live{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--green);letter-spacing:.1em;text-transform:uppercase}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* LAYOUT */
.app{display:grid;grid-template-columns:200px 1fr;min-height:100vh;padding-top:58px;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{background:rgba(10,10,20,.65);border-right:1px solid var(--b1);padding:18px 0;position:sticky;top:58px;height:calc(100vh - 58px);display:flex;flex-direction:column}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);padding:0 16px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sb-item.on{color:var(--gold);background:var(--gd);border-left-color:var(--gold)}
.sb-ico{font-size:14px;width:18px;text-align:center}
.sb-cnt{margin-left:auto;font-size:10px;font-weight:700;color:var(--t3);background:rgba(255,255,255,.06);padding:1px 6px;border-radius:8px}
.sb-div{height:1px;background:var(--b1);margin:10px 16px}
.sb-bot{margin-top:auto;padding:14px}
.sb-stat{background:var(--gd);border:1px solid rgba(245,200,66,.12);border-radius:8px;padding:12px;margin-bottom:8px;text-align:center}
.sb-stat-n{font-family:var(--sg);font-size:22px;font-weight:800;color:var(--gold);line-height:1}
.sb-stat-l{font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.sb-fascia{font-size:11px;font-weight:600;color:var(--t2);text-align:center;padding:8px}

/* MAIN */
.main{padding:20px;display:flex;flex-direction:column;gap:8px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:11px;background:var(--gold);border-radius:2px;box-shadow:0 0 6px rgba(245,200,66,.4)}

/* ── HURRY UP CARD (breve) ── */
.card-hurry{background:var(--card);border:1px solid rgba(255,61,90,.2);border-radius:14px;overflow:hidden;box-shadow:var(--sh);animation:fadeUp .4s ease forwards;opacity:0;position:relative;cursor:pointer;transition:all .25s}
.card-hurry::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.card-hurry:hover{transform:translateY(-2px);box-shadow:0 32px 70px rgba(0,0,0,.8)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

.ch-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px}
.ch-badge{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--red);background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.2);padding:3px 10px;border-radius:20px}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1s ease-in-out infinite}
.ch-timer{font-family:var(--sg);font-size:20px;font-weight:900;color:var(--red);text-shadow:0 0 20px rgba(255,61,90,.5);letter-spacing:.02em}
.ch-body{padding:0 18px 16px}
.ch-cat{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
.ch-q{font-family:var(--sg);font-size:18px;font-weight:800;line-height:1.28;letter-spacing:-.02em;margin-bottom:10px}
.ch-info{background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--t2);line-height:1.6;border-left:2px solid rgba(255,61,90,.3)}
.ch-info-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.ch-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ch-btn{padding:12px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--sg);border:1px solid transparent;transition:all .2s;text-align:center}
.ch-btn.yes{background:rgba(0,232,122,.09);border-color:rgba(0,232,122,.2);color:var(--green)}
.ch-btn.yes:hover{background:var(--green);color:#000;box-shadow:0 8px 24px rgba(0,232,122,.35);transform:scale(1.02)}
.ch-btn.no{background:rgba(255,61,90,.09);border-color:rgba(255,61,90,.2);color:var(--red)}
.ch-btn.no:hover{background:var(--red);color:#fff;box-shadow:0 8px 24px rgba(255,61,90,.35);transform:scale(1.02)}
.ch-btn:disabled{opacity:.3;cursor:default;transform:none!important}
.ch-btn.voted-y{background:var(--green);color:#000}
.ch-btn.voted-n{background:var(--red);color:#fff}
.ch-meta{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.05);font-size:10px;color:var(--t3)}
.ch-reward{margin-left:auto;color:var(--red);font-weight:700;font-family:var(--sg)}

/* ── DEEP BET CARD (lunga) ── */
.card-deep{background:var(--card);border:1px solid var(--cb);border-radius:14px;overflow:hidden;box-shadow:var(--sh);animation:fadeUp .4s ease forwards;opacity:0;cursor:pointer;transition:all .25s;position:relative}
.card-deep::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-deep:hover{transform:translateY(-2px);border-color:rgba(245,200,66,.15)}
.cd-hero{padding:20px 20px 16px;position:relative}
.cd-badges{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.deep-badge{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.2);padding:3px 10px;border-radius:20px}
.cd-cat{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
.cd-q{font-family:var(--sg);font-size:19px;font-weight:800;line-height:1.28;letter-spacing:-.02em;margin-bottom:8px}
.cd-context{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:14px;padding-left:10px;border-left:2px solid rgba(255,255,255,.08)}
.cd-timer{display:inline-flex;align-items:center;gap:6px;font-family:var(--sg);font-size:12px;font-weight:700;color:var(--gold);background:var(--gd);border:1px solid rgba(245,200,66,.15);padding:4px 12px;border-radius:20px;margin-bottom:14px}

/* SOTTO-SCOMMESSE */
.cd-bets{border-top:1px solid var(--b1)}
.cd-bet{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.cd-bet:last-child{border-bottom:none}
.cd-bet:hover{background:rgba(255,255,255,.02)}
.cd-bet-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.cd-bet-cr{font-family:var(--sg);font-size:10px;font-weight:700;color:var(--gold)}
.cd-bet-opts{display:flex;flex-wrap:wrap;gap:5px}
.cd-opt{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--b2);background:rgba(255,255,255,.04);color:var(--t2);transition:all .18s;font-family:var(--sg)}
.cd-opt:hover{border-color:rgba(245,200,66,.25);color:var(--gold);background:var(--gd)}
.cd-opt.sel{border-color:var(--gold);color:var(--gold);background:var(--gd);box-shadow:0 0 12px rgba(245,200,66,.15)}
.cd-opt.sel-green{border-color:var(--green);color:var(--green);background:rgba(0,232,122,.08)}
.cd-opt:disabled{opacity:.35;cursor:default}

.cd-footer{padding:14px 20px;background:rgba(0,0,0,.2);display:flex;align-items:center;gap:10px}
.cd-submit{flex:1;padding:12px;background:var(--gold);border:none;color:#000;font-size:13px;font-weight:800;cursor:pointer;border-radius:9px;font-family:var(--sg);transition:all .2s}
.cd-submit:hover{opacity:.88;transform:scale(1.01)}
.cd-submit:disabled{opacity:.3;cursor:default;transform:none}
.cd-total-cr{font-family:var(--sg);font-size:13px;font-weight:700;color:var(--gold)}
.cd-voted-msg{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;background:rgba(16,16,26,.97);border:1px solid var(--b2);border-radius:12px;padding:11px 16px;font-size:12px;color:var(--text);z-index:999;opacity:0;transition:all .28s;pointer-events:none;backdrop-filter:blur(20px);box-shadow:0 16px 48px rgba(0,0,0,.6);font-family:var(--sg)}
.toast.show{opacity:1;transform:translateY(-4px)}

/* MODAL DETAIL */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(4,4,12,.88);backdrop-filter:blur(16px);display:none;overflow-y:auto;padding:20px}
.modal-bg.open{display:block}
.modal-close{position:fixed;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.07);border:1px solid var(--b2);border-radius:50%;color:var(--text);font-size:20px;cursor:pointer;z-index:501;display:flex;align-items:center;justify-content:center}
.modal-wrap{max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:10px;padding-bottom:40px}
.mbox{background:rgba(16,16,26,.98);border:1px solid var(--b2);border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.8)}
.mbox-head{padding:16px 22px;border-bottom:1px solid var(--b1);font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.mbox-head::before{content:'';width:3px;height:11px;background:var(--gold);border-radius:2px}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .nav-cats{display:none}
}
</style>
</head>

<script>
const BUR='https://god-core-backend.onrender.com';

// ── QUOTA RATING SYSTEM (ELO percentile) ──────────────────────
// Non crediti assoluti — posizione percentile dinamica
// Se non giochi, scendi. Se azzecchi quando gli altri sbagliano, sali molto.

const FASCIA_LIST=[
  {n:'🌑 Neutrino',   pct:0,  max:40, c:'#a0a09a', rev:0},
  {n:'🔵 Orbiter',    pct:40, max:70, c:'#60a5fa', rev:5},
  {n:'💜 Pulsar',     pct:70, max:85, c:'#c084fc', rev:15},
  {n:'⭐ Quasar',     pct:85, max:95, c:'#f5c842', rev:30},
  {n:'✦ Singolarità', pct:95, max:100,c:'#00e87a', rev:50},
];

// QR = QUOTA Rating, da 0 a 1000
// Percentile = posizione vs community simulata
let qr = parseFloat(localStorage.getItem('q_qr')||'400'); // parte da 40° percentile
let votes = JSON.parse(localStorage.getItem('qvotes')||'{}');
let deepVotes = JSON.parse(localStorage.getItem('qdvotes')||'{}');
let voti_totali = parseInt(localStorage.getItem('q_vtot')||'0');
let azzeccati = parseInt(localStorage.getItem('q_azz')||'0');
let currentStreak = parseInt(localStorage.getItem('q_st')||'0');

// Simula community size per calcolo percentile
const COMMUNITY_SIZE = 2847;

function getPercentile(qr_val){
  // Formula: rating 0=0%, 500=50%, 1000=100% con curva
  return Math.min(99, Math.max(0, Math.round((qr_val/1000)*100)));
}

function getFascia(pct){
  return FASCIA_LIST.slice().reverse().find(f=>pct>=f.pct)||FASCIA_LIST[0];
}

// ELO update: quanto vale azzeccare dipende da quanto era difficile
// Se il 20% aveva detto sì e hai detto sì → guadagni molto
// Se l'80% aveva detto sì e hai detto sì → guadagni poco
function updateRating(choice, correctAnswer, pctYes){
  const pctCorrect = correctAnswer==='si' ? pctYes/100 : (100-pctYes)/100;
  const difficulty = 1 - pctCorrect; // più era improbabile, più vale
  
  if(choice===correctAnswer){
    // Azzeccata: +punti proporzionali alla difficoltà
    const gain = Math.round(10 + difficulty * 40); // da +10 a +50
    qr = Math.min(1000, qr + gain);
    azzeccati++;
    localStorage.setItem('q_azz', azzeccati);
    return {result:'win', delta:'+'+gain};
  } else {
    // Sbagliata: -punti (meno se era difficile, di più se era facile)
    const loss = Math.round(5 + (1-difficulty) * 20); // da -5 a -25
    qr = Math.max(0, qr - loss);
    return {result:'loss', delta:'-'+loss};
  }
}

// Decay passivo: ogni giorno senza votare perdi rating
// perché gli altri giocano e ti superano
function applyDecay(){
  const last = parseInt(localStorage.getItem('q_ldt')||Date.now());
  const daysMissed = Math.floor((Date.now()-last)/86400000);
  if(daysMissed >= 2){
    const decayDays = daysMissed - 1;
    const decayAmount = decayDays * 8; // -8 QR per giorno
    qr = Math.max(0, qr - decayAmount);
    if(decayAmount > 0) console.log('[QUOTA] Decay: -'+decayAmount+' QR ('+decayDays+'gg inattivo)');
  }
}

function checkStreak(){
  const today = new Date().toDateString();
  const last = localStorage.getItem('q_ld');
  const yest = new Date(Date.now()-86400000).toDateString();
  if(last===today) return currentStreak;
  if(last===yest){
    currentStreak++;
    if(currentStreak===7){qr=Math.min(1000,qr+30);toast('🔥 Streak 7 giorni! +30 QR');}
    if(currentStreak===30){qr=Math.min(1000,qr+100);toast('🏆 Streak 30 giorni! +100 QR');}
  } else if(last&&last!==yest){
    qr=Math.max(0,qr-15);
    currentStreak=1;
    toast('💔 Streak rotta: -15 QR');
  } else {currentStreak=1;}
  localStorage.setItem('q_st',currentStreak);
  localStorage.setItem('q_ld',today);
  localStorage.setItem('q_ldt',Date.now());
  return currentStreak;
}

function save(){
  localStorage.setItem('q_qr', qr.toFixed(1));
  localStorage.setItem('qvotes', JSON.stringify(votes));
  localStorage.setItem('qdvotes', JSON.stringify(deepVotes));
  localStorage.setItem('q_vtot', voti_totali);
  const pct = getPercentile(qr);
  const fascia = getFascia(pct);
  // Aggiorna UI
  const ncr = document.getElementById('nav-cr');
  if(ncr) ncr.textContent = 'Top '+Math.max(1,100-pct)+'%';
  const sbcr = document.getElementById('sb-cr');
  if(sbcr) sbcr.textContent = Math.round(qr)+' QR';
  const sbf = document.getElementById('sb-fascia');

function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}
function cd(dl){
  const d=dl-Date.now();
  if(d<=0)return'SCADUTA';
  const h=Math.floor(d/3600000);const m=Math.floor((d%3600000)/60000);const s=Math.floor((d%60000)/1000);
  if(h>72)return Math.floor(h/24)+'g '+h%24+'h';
  if(h>0)return h+'h '+m+'m';
  return m+'m '+s+'s';
}

function selectOpt(cardId,betId,opt,btn){
  if(!deepVotes[cardId])deepVotes[cardId]={};

  else{

}

function filterCat(cat){
  activeCat=cat;showMiei=false;
  document.querySelectorAll('.nav-cat').forEach(b=>{
    b.classList.toggle('on',b.textContent===cat||(cat==='tutti'&&b.textContent==='Tutti'));
  });
  renderMain();
}
function filterType(type){
  activeType=type;showMiei=false;
  document.querySelectorAll('.sb-item').forEach(b=>{
    b.classList.toggle('on',b.textContent.trim().startsWith(type==='tutti'?'Tutte':type==='hurry'?'Hurry':'Deep'));
  });
  renderMain();
}
function filterMiei(){showMiei=true;renderMain();}

// ── RENDER MAIN ───────────────────────────────────────────────
function renderMain(){
  let hurry=[...HURRY];
  let deep=[...DEEP];
  if(activeCat!=='tutti'){hurry=hurry.filter(c=>c.cat===activeCat);deep=deep.filter(c=>c.cat===activeCat);}
  if(showMiei){hurry=hurry.filter(c=>votes[c.id]);deep=deep.filter(c=>deepVotes[c.id]&&Object.keys(deepVotes[c.id]).length>0);}
  if(activeType==='hurry')deep=[];
  if(activeType==='deep')hurry=[];

  document.getElementById('cnt-tutti').textContent=HURRY.length+DEEP.length;
  document.getElementById('cnt-hurry').textContent=HURRY.length;
  document.getElementById('cnt-deep').textContent=DEEP.length;

  const hs=document.querySelector('.sec-head');
  if(hs)hs.style.display=hurry.length?'flex':'none';
  const ds=document.querySelectorAll('.sec-head')[1];
  if(ds)ds.style.display=deep.length?'flex':'none';

  renderHurry(hurry);
  renderDeep(deep);
  save();
}
