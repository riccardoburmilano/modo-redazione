<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUOTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;
  --gold:#f5c842;--gold2:#e8a800;--gold-glow:rgba(245,200,66,.15);
  --green:#00e87a;--green-glow:rgba(0,232,122,.12);
  --red:#ff3d5a;--red-glow:rgba(255,61,90,.12);
  --blue:#4f8ef7;--purple:#9f6ef5;
  --text:#f0efe8;--t2:#a0a09a;--t3:#505050;
  --g:'Inter',sans-serif;--sg:'Space Grotesk',sans-serif;
  --card-bg:rgba(18,18,28,.85);
  --card-border:rgba(255,255,255,.07);
  --card-shadow:0 24px 64px rgba(0,0,0,.7),0 4px 16px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
}

html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--g);overflow-x:hidden}

/* BG GRADIENT */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%,rgba(80,40,120,.25) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(30,60,120,.2) 0%,transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%,rgba(245,200,66,.04) 0%,transparent 70%);
  pointer-events:none;
}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:60px;
  background:rgba(8,8,16,.8);
  backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;padding:0 24px;gap:16px;
}
.nav-logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-ast{animation:rot 20s linear infinite;filter:drop-shadow(0 0 6px rgba(245,200,66,.4))}
@keyframes rot{to{transform:rotate(360deg)}}
.nav-logo{
  font-family:var(--sg);font-size:22px;font-weight:800;
  letter-spacing:-.02em;
  background:linear-gradient(135deg,#fff 0%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-cats{display:flex;gap:2px;margin-left:12px}
.nav-cat{
  font-size:11px;font-weight:600;color:var(--t3);
  padding:6px 14px;cursor:pointer;border:none;background:none;
  letter-spacing:.05em;text-transform:uppercase;
  border-radius:20px;transition:all .2s;
}
.nav-cat:hover{color:var(--t2);background:rgba(255,255,255,.04)}
.nav-cat.on{color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.nav-credits{
  font-family:var(--sg);font-size:13px;font-weight:700;
  color:var(--gold);display:flex;align-items:center;gap:6px;
  padding:6px 14px;
  background:rgba(245,200,66,.08);
  border:1px solid rgba(245,200,66,.15);
  border-radius:20px;
}
.nav-live{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;color:var(--green);
  letter-spacing:.1em;text-transform:uppercase;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* LAYOUT */
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;padding-top:60px;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{
  background:rgba(12,12,20,.6);
  backdrop-filter:blur(12px);
  border-right:1px solid rgba(255,255,255,.04);
  padding:24px 0;
  position:sticky;top:60px;height:calc(100vh - 60px);
  display:flex;flex-direction:column;
}
.sidebar-section{padding:0 16px;margin-bottom:24px}
.sidebar-label{
  font-size:9px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--t3);
  padding:0 10px;margin-bottom:8px;
}
.sidebar-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:8px;
  cursor:pointer;transition:all .18s;
  border:1px solid transparent;background:none;
  color:var(--t2);font-size:12px;font-weight:500;
  width:100%;text-align:left;
}
.sidebar-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sidebar-item.on{
  background:rgba(245,200,66,.08);
  border-color:rgba(245,200,66,.15);
  color:var(--gold);
}
.sidebar-icon{font-size:15px;width:22px;text-align:center}
.sidebar-count{
  margin-left:auto;font-size:10px;font-weight:700;
  color:var(--t3);background:rgba(255,255,255,.06);
  padding:2px 7px;border-radius:10px;
}
.sidebar-divider{height:1px;background:rgba(255,255,255,.04);margin:8px 16px}
.sidebar-bottom{margin-top:auto;padding:16px}
.sidebar-stat{
  padding:14px;
  background:rgba(245,200,66,.06);
  border:1px solid rgba(245,200,66,.1);
  border-radius:8px;margin-bottom:8px;
}
.sidebar-stat-n{
  font-family:var(--sg);font-size:24px;font-weight:800;
  color:var(--gold);line-height:1;
  text-shadow:0 0 20px rgba(245,200,66,.3);
}
.sidebar-stat-l{font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}

/* MAIN */
.main{padding:24px;display:flex;flex-direction:column;gap:12px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{
  font-family:var(--sg);font-size:11px;font-weight:700;
  color:var(--t3);letter-spacing:.12em;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.section-title::before{
  content:'';width:3px;height:12px;
  background:linear-gradient(180deg,var(--gold),var(--gold2));
  border-radius:2px;box-shadow:0 0 8px rgba(245,200,66,.5);
}

/* CARD */
.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:16px;
  box-shadow:var(--card-shadow);
  backdrop-filter:blur(20px) saturate(150%);
  overflow:hidden;
  cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  animation:fadeUp .5s ease forwards;
  opacity:0;transform:translateY(16px);
  position:relative;
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.card::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-3px) scale(1.005);
  box-shadow:0 32px 80px rgba(0,0,0,.8),0 8px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
  border-color:rgba(255,255,255,.12);
}

/* FEATURED */
.card.featured{
  border-color:rgba(245,200,66,.2);
  background:rgba(18,16,28,.9);
}
.card.featured::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),transparent);
  border-radius:16px 16px 0 0;
}
.featured-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);
  background:rgba(245,200,66,.1);
  border:1px solid rgba(245,200,66,.2);
  padding:3px 10px;border-radius:20px;
}

.card-inner{padding:22px 24px}

.card-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.card-cat-wrap{display:flex;align-items:center;gap:8px}
.card-cat{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
.cat-sport{color:#fb923c}.cat-finanza{color:var(--gold)}.cat-politica{color:var(--purple)}.cat-mondo{color:var(--blue)}.cat-tech{color:#2dd4bf}

.card-time{
  font-size:11px;font-weight:600;color:var(--t3);
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  padding:4px 10px;border-radius:20px;
}

.card-question{
  font-family:var(--sg);
  font-size:18px;font-weight:700;line-height:1.3;
  color:var(--text);margin-bottom:8px;letter-spacing:-.02em;
}
.card.featured .card-question{font-size:22px}

.card-context{
  font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:20px;
  border-left:2px solid rgba(255,255,255,.08);padding-left:10px;
}

/* BARRA */
.bar-wrap{margin-bottom:18px}
.bar-labels{display:flex;justify-content:space-between;margin-bottom:8px}
.bar-label{font-size:11px;font-weight:700;letter-spacing:.04em}
.bar-label.yes{color:var(--green)}.bar-label.no{color:var(--red)}

.bar{
  height:8px;background:rgba(255,255,255,.06);
  border-radius:4px;overflow:hidden;position:relative;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.5);
}
.bar-yes{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,#00c866,var(--green));
  box-shadow:0 0 12px rgba(0,232,122,.4);
  transition:width 1.2s cubic-bezier(.34,1.2,.64,1);
}
.bar-no{
  position:absolute;top:0;right:0;height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--red),#ff6b81);
  box-shadow:0 0 12px rgba(255,61,90,.4);
  transition:width 1.2s cubic-bezier(.34,1.2,.64,1);
}
.bar-pcts{display:flex;justify-content:space-between;margin-top:8px}
.bar-pct{font-family:var(--sg);font-size:15px;font-weight:800}
.bar-pct.yes{
  color:var(--green);
  text-shadow:0 0 16px rgba(0,232,122,.5);
}
.bar-pct.no{
  color:var(--red);
  text-shadow:0 0 16px rgba(255,61,90,.5);
}

/* VOTE BUTTONS */
.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vbtn{
  padding:12px 16px;border-radius:10px;
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all .2s cubic-bezier(.34,1.4,.64,1);
  text-align:center;letter-spacing:.04em;
  font-family:var(--sg);border:1px solid transparent;
  position:relative;overflow:hidden;
}
.vbtn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 60%);
  pointer-events:none;
}
.vbtn.yes{
  background:rgba(0,232,122,.1);
  border-color:rgba(0,232,122,.2);
  color:var(--green);
}
.vbtn.yes:hover{
  background:var(--green);color:#000;
  box-shadow:0 8px 24px rgba(0,232,122,.4);
  transform:scale(1.02);
}
.vbtn.no{
  background:rgba(255,61,90,.1);
  border-color:rgba(255,61,90,.2);
  color:var(--red);
}
.vbtn.no:hover{
  background:var(--red);color:#fff;
  box-shadow:0 8px 24px rgba(255,61,90,.4);
  transform:scale(1.02);
}
.vbtn.voted-yes{background:var(--green);color:#000;box-shadow:0 4px 16px rgba(0,232,122,.3)}
.vbtn.voted-no{background:var(--red);color:#fff;box-shadow:0 4px 16px rgba(255,61,90,.3)}
.vbtn:disabled{cursor:default;transform:none}

/* META */
.card-meta{
  display:flex;align-items:center;gap:10px;
  margin-top:14px;padding-top:14px;
  border-top:1px solid rgba(255,255,255,.05);
}
.meta-votes{font-size:10px;color:var(--t3)}
.meta-voted{font-size:10px;color:var(--green)}
.meta-reward{
  margin-left:auto;font-size:10px;font-weight:700;
  color:var(--gold);display:flex;align-items:center;gap:4px;
}

/* TOAST */
.toast{
  position:fixed;bottom:28px;right:24px;
  background:rgba(18,18,28,.95);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:12px 18px;font-size:12px;font-weight:500;color:var(--text);
  z-index:999;opacity:0;transition:all .3s;
  pointer-events:none;
  backdrop-filter:blur(20px);
  box-shadow:0 16px 48px rgba(0,0,0,.6);
}
.toast.show{opacity:1;transform:translateY(-4px)}

/* EMPTY */
.empty{
  padding:60px;text-align:center;color:var(--t3);
  background:rgba(255,255,255,.02);border-radius:16px;
  border:1px dashed rgba(255,255,255,.06);
}
.empty-title{font-family:var(--sg);font-size:18px;color:var(--t2);margin-bottom:8px}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .nav-cats{display:none}
  .card.featured .card-question{font-size:18px}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo-wrap" href="#" style="text-decoration:none">
    <svg class="nav-ast" width="22" height="22" viewBox="0 0 22 22" fill="none">
      <line x1="11" y1="1" x2="11" y2="21" stroke="#f5c842" stroke-width="1.4"/>
      <line x1="1" y1="11" x2="21" y2="11" stroke="#f5c842" stroke-width="1.4"/>
      <line x1="3.22" y1="3.22" x2="18.78" y2="18.78" stroke="#f5c842" stroke-width="1.4"/>
      <line x1="18.78" y1="3.22" x2="3.22" y2="18.78" stroke="#f5c842" stroke-width="1.4"/>
    </svg>
    <div class="nav-logo">QUOTA</div>
  </a>
  <div class="nav-cats">
    <button class="nav-cat on" onclick="filterCat('tutti')">Tutti</button>
    <button class="nav-cat" onclick="filterCat('Sport')">Sport</button>
    <button class="nav-cat" onclick="filterCat('Finanza')">Finanza</button>
    <button class="nav-cat" onclick="filterCat('Politica')">Politica</button>
    <button class="nav-cat" onclick="filterCat('Mondo')">Mondo</button>
    <button class="nav-cat" onclick="filterCat('Tech')">Tech</button>
  </div>
  <div class="nav-right">
    <div class="nav-credits">⚡ <span id="nav-credits">100</span> cr</div>
    <div class="nav-live"><span class="live-dot"></span>Live</div>
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Sezioni</div>
      <button class="sidebar-item on" onclick="filterCat('tutti')">
        <span class="sidebar-icon">◈</span>Tutti
        <span class="sidebar-count" id="c-tutti">0</span>
      </button>
      <button class="sidebar-item" onclick="filterCat('Sport')">
        <span class="sidebar-icon">⚽</span>Sport
        <span class="sidebar-count" id="c-Sport">0</span>
      </button>
      <button class="sidebar-item" onclick="filterCat('Finanza')">
        <span class="sidebar-icon">📈</span>Finanza
        <span class="sidebar-count" id="c-Finanza">0</span>
      </button>
      <button class="sidebar-item" onclick="filterCat('Politica')">
        <span class="sidebar-icon">🏛</span>Politica
        <span class="sidebar-count" id="c-Politica">0</span>
      </button>
      <button class="sidebar-item" onclick="filterCat('Mondo')">
        <span class="sidebar-icon">🌍</span>Mondo
        <span class="sidebar-count" id="c-Mondo">0</span>
      </button>
      <button class="sidebar-item" onclick="filterCat('Tech')">
        <span class="sidebar-icon">⚡</span>Tech
        <span class="sidebar-count" id="c-Tech">0</span>
      </button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">I miei voti</div>
      <button class="sidebar-item" onclick="filterStatus('mie')">
        <span class="sidebar-icon">★</span>Le mie quota
      </button>
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-stat">
        <div class="sidebar-stat-n" id="sb-cr">100</div>
        <div class="sidebar-stat-l">Crediti QUOTA</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-n" id="sb-acc">—</div>
        <div class="sidebar-stat-l">Voti dati</div>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="section-header">
      <div class="section-title" id="sec-title">In corso</div>
    </div>
    <div id="cards"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let credits=parseInt(localStorage.getItem('qcr')||'100');
let votes=JSON.parse(localStorage.getItem('qvotes')||'{}');
let activeCat='tutti',activeStatus='aperte';

const BUR='https://god-core-backend.onrender.com';

const CARDS=[
  {id:'wim1',cat:'Sport',featured:true,
   question:'Sinner difende il titolo a Wimbledon 2026?',
   context:'Numero 1 del mondo e campione in carica. Alcaraz out per infortunio al polso. Il campo è insolitamente aperto.',
   pctYes:71,votes:1847,deadline:new Date('2026-07-12T17:00:00').getTime(),reward:50,status:'aperta'},
  {id:'wim2',cat:'Sport',
   question:'Sinner raggiungerà la semifinale di Wimbledon?',
   context:'Da favorito assoluto e numero 1, la semifinale sarebbe la minima attesa. Ma l\'erba è imprevedibile.',
   pctYes:86,votes:934,deadline:new Date('2026-07-09T17:00:00').getTime(),reward:20,status:'aperta'},
  {id:'wim3',cat:'Sport',
   question:'Un italiano in finale a Wimbledon 2026?',
   context:'Sinner, Musetti, Cobolli e Darderi nel tabellone. La più forte rappresentanza italiana della storia.',
   pctYes:79,votes:672,deadline:new Date('2026-07-11T17:00:00').getTime(),reward:30,status:'aperta'},
  {id:'fin1',cat:'Finanza',
   question:'Il BTP 10Y chiude sopra 3.5% questa settimana?',
   context:'Spread BTP-Bund in area 120bp. BCE in pausa. Mercati in attesa dei dati macro USA di venerdì.',
   pctYes:43,votes:412,deadline:new Date('2026-07-04T17:30:00').getTime(),reward:25,status:'aperta'},
  {id:'fin2',cat:'Finanza',
   question:'Wall Street chiude la settimana in positivo?',
   context:'S&P 500 vicino ai massimi storici. Dati occupazione in uscita venerdì. La Fed tiene i tassi fermi.',
   pctYes:61,votes:589,deadline:new Date('2026-07-04T22:00:00').getTime(),reward:20,status:'aperta'},
  {id:'pol1',cat:'Politica',
   question:'FdI supera il 30% nei sondaggi a luglio?',
   context:'FdI stabile al 28-29% da mesi. L\'estate storicamente favorisce il partito di governo.',
   pctYes:35,votes:298,deadline:new Date('2026-07-31T23:59:00').getTime(),reward:35,status:'aperta'},
  {id:'mon1',cat:'Mondo',
   question:'Cessate il fuoco in Medio Oriente entro 30 giorni?',
   context:'Negoziati in corso con mediazione USA-Qatar. Le trattative slittano da mesi. La storia è chiara.',
   pctYes:19,votes:1102,deadline:new Date('2026-08-01T23:59:00').getTime(),reward:60,status:'aperta'},
  {id:'tec1',cat:'Tech',
   question:'Apple annuncia un device AI standalone entro settembre?',
   context:'Rumors circolano da mesi su un dispositivo AI dedicato post-iPhone. Tim Cook ha evitato la domanda al WWDC.',
   pctYes:28,votes:634,deadline:new Date('2026-09-30T23:59:00').getTime(),reward:40,status:'aperta'},
];

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

function cd(dl){
  const d=dl-Date.now();
  if(d<=0)return'Scaduta';
  const days=Math.floor(d/86400000);
  const hrs=Math.floor((d%86400000)/3600000);
  const min=Math.floor((d%3600000)/60000);
  if(days>0)return days+'g '+hrs+'h';
  if(hrs>0)return hrs+'h '+min+'m';
  return min+'m';
}

function save(){
  localStorage.setItem('qcr',credits);
  localStorage.setItem('qvotes',JSON.stringify(votes));
  document.getElementById('nav-credits').textContent=credits;
  document.getElementById('sb-cr').textContent=credits;
  document.getElementById('sb-acc').textContent=Object.keys(votes).length;
}

function render(){
  let cards=[...CARDS];
  if(activeCat!=='tutti')cards=cards.filter(c=>c.cat===activeCat);
  if(activeStatus==='mie')cards=cards.filter(c=>votes[c.id]);
  cards.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0));

  // Counts
  ['tutti','Sport','Finanza','Politica','Mondo','Tech'].forEach(cat=>{
    const el=document.getElementById('c-'+cat);
    if(el)el.textContent=cat==='tutti'?CARDS.length:CARDS.filter(c=>c.cat===cat).length;
  });

  const wrap=document.getElementById('cards');
  if(!cards.length){
    wrap.innerHTML='<div class="empty"><div class="empty-title">Nessuna quota</div><div style="font-size:13px;margin-top:6px;color:var(--t3)">Nuove quote in arrivo.</div></div>';
    return;
  }

  wrap.innerHTML=cards.map((c,i)=>{
    const mv=votes[c.id];
    const pno=100-c.pctYes;
    const delay=i*60;
    return `<div class="card${c.featured?' featured':''}" style="animation-delay:${delay}ms;margin-bottom:10px">
      <div class="card-inner">
        <div class="card-top">
          <div class="card-cat-wrap">
            ${c.featured?'<span class="featured-badge">⚡ In evidenza</span>':''}
            <span class="card-cat cat-${c.cat.toLowerCase()}">${c.cat}</span>
          </div>
          <div class="card-time">⏱ <span id="cd-${c.id}">${cd(c.deadline)}</span></div>
        </div>
        <div class="card-question">${c.question}</div>
        <div class="card-context">${c.context}</div>
        <div class="bar-wrap">
          <div class="bar-labels">
            <span class="bar-label yes">Sì &nbsp;${c.pctYes}%</span>
            <span class="bar-label no">${pno}%&nbsp; No</span>
          </div>
          <div class="bar">
            <div class="bar-yes" style="width:${c.pctYes}%"></div>
            <div class="bar-no" style="width:${pno}%"></div>
          </div>
        </div>
        ${!mv?
          `<div class="vote-grid">
            <button class="vbtn yes" onclick="vote('${c.id}','si',${c.reward},event)">✓ &nbsp;Sì — ${c.pctYes}%</button>
            <button class="vbtn no" onclick="vote('${c.id}','no',${c.reward},event)">✗ &nbsp;No — ${pno}%</button>
          </div>`:
          `<div class="vote-grid">
            <button class="vbtn ${mv==='si'?'voted-yes':'yes'}" style="opacity:${mv==='si'?1:.25}" disabled>✓ &nbsp;Sì</button>
            <button class="vbtn ${mv==='no'?'voted-no':'no'}" style="opacity:${mv==='no'?1:.25}" disabled>✗ &nbsp;No</button>
          </div>`
        }
        <div class="card-meta">
          <span class="meta-votes">${(c.votes+(mv?1:0)).toLocaleString('it-IT')} voti</span>
          ${mv?`<span class="meta-voted">✓ Hai votato ${mv==='si'?'Sì':'No'}</span>`:''}
          <span class="meta-reward">+${c.reward} cr se azzecchi</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Countdown update
  clearInterval(window._cdTimer);
  window._cdTimer=setInterval(()=>{
    cards.forEach(c=>{const el=document.getElementById('cd-'+c.id);if(el)el.textContent=cd(c.deadline);});
  },30000);
}

function vote(id,choice,reward,e){
  e.stopPropagation();
  if(votes[id])return;
  votes[id]=choice;
  credits+=5;
  save();render();
  toast('⚡ Voto registrato · +5 cr · +'+reward+' cr se azzecchi');
}

function filterCat(cat){
  activeCat=cat;
  document.querySelectorAll('.nav-cat,.sidebar-item').forEach(b=>{
    const txt=b.textContent.trim().replace(/[⚽📈🏛🌍⚡◈★]\s*/,'').replace(/\s*\d+$/,'').trim();
    b.classList.toggle('on',txt===cat||(cat==='tutti'&&['Tutti','tutti','◈'].some(x=>txt.includes(x))));
  });
  document.getElementById('sec-title').textContent=cat==='tutti'?'In corso':cat;
  render();
}

function filterStatus(s){activeStatus=s;render();}

// Generatore automatico da RSS
async function generateFromRSS(){
  const groqKey=localStorage.getItem('quota_groq_key');
  if(!groqKey)return;
  try{
    const r=await fetch(BUR+'/api/v2/modo/news?limit=10&lang=it');
    const d=await r.json();
    if(!d.ok||!d.articles?.length)return;
    const nuove=d.articles.filter(a=>!CARDS.find(c=>c.id===a.id)).slice(0,2);
    for(const a of nuove){
      try{
        const r2=await fetch('https://api.groq.com/openai/v1/chat/completions',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
          body:JSON.stringify({
            model:'llama-3.1-8b-instant',max_tokens:200,temperature:0.6,
            messages:[
              {role:'system',content:'Trasforma notizie in domande predittive sì/no. Rispondi SOLO con JSON valido: {"domanda":"max 80 caratteri","contesto":"max 100 caratteri","pct_si":50,"categoria":"Sport|Finanza|Politica|Mondo|Tech","ore":24}'},
              {role:'user',content:a.sourceTitle+'. '+a.sourceDesc}
            ]
          })
        });
        const rd=await r2.json();
        const m=(rd.choices?.[0]?.message?.content||'{}').match(/\{[\s\S]*\}/);
        if(!m)continue;
        const g=JSON.parse(m[0]);
        if(!g.domanda)continue;
        CARDS.unshift({
          id:a.id||'g'+Date.now(),cat:g.categoria||'Mondo',
          question:g.domanda,context:g.contesto||'',
          pctYes:Math.min(90,Math.max(10,g.pct_si||50)),
          votes:Math.floor(Math.random()*150+10),
          deadline:Date.now()+(g.ore||24)*3600000,
          reward:g.ore>48?40:20,status:'aperta'
        });
        render();
        toast('⚡ Nuova quota: '+g.domanda.slice(0,45)+'...');
        await new Promise(r=>setTimeout(r,3000));
      }catch(e){}
    }
  }catch(e){}
}

function setupKey(){
  if(localStorage.getItem('quota_groq_key'))return true;
  const k=window.prompt('Groq API key per quote automatiche (console.groq.com):');
  if(k?.trim()){localStorage.setItem('quota_groq_key',k.trim());return true;}
  return false;
}

// INIT
save();render();
setTimeout(()=>{if(setupKey())generateFromRSS();},2000);
setInterval(()=>{if(localStorage.getItem('quota_groq_key'))generateFromRSS();},5*60*1000);
</script>
